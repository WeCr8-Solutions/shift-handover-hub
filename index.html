    <!-- Google AdSense — loaded early (async) so Google's AdSense review crawler
         can detect the script during verification. Suppressed for ITAR builds via
         the runtime guard below (the script tag is removed before parse when
         VITE_DISABLE_ANALYTICS=true). -->
    <meta name="google-adsense-account" content="ca-pub-3639153716376265">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3639153716376265" crossorigin="anonymous" data-adsense-loader></script>
    <script>
      // ITAR build: strip the AdSense script before it executes.
      if ('%VITE_DISABLE_ANALYTICS%' === 'true') {
        var __a = document.querySelector('script[data-adsense-loader]');
        if (__a) __a.remove();
      }
    </script>



    <!--
      Third-party analytics / ad scripts are loaded conditionally at runtime.
      They are suppressed entirely when VITE_DISABLE_ANALYTICS=true
      (required for ITAR self-hosted deployments).
    -->
    <script>
      // Guard: set __ANALYTICS_ENABLED__ from the Vite-injected meta tag so the
      // inline loader can read it before the React bundle hydrates.
      // VITE_DISABLE_ANALYTICS is replaced at build time by Vite.
      // Value is 'true' to disable (ITAR deployments) or '' / undefined to enable.
      window.__ANALYTICS_ENABLED__ = '%VITE_DISABLE_ANALYTICS%' !== 'true' && !['localhost', '127.0.0.1'].includes(window.location.hostname);

      window.addEventListener('load', function() {
        if (!window.__ANALYTICS_ENABLED__) return; // ITAR / self-hosted: skip all telemetry

        // Initialize gtag stub immediately so callers (e.g. gtag_report_conversion) work before scripts load
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config','G-FDFFDKQS0Q',{send_page_view:false});
        gtag('config','AW-17425064696',{send_page_view:false});

        // Google Ads conversion helper: queues into dataLayer; works whether or not gtag.js has loaded
        window.gtag_report_conversion = function(url) {
          var callback = function() {
            if (typeof(url) !== 'undefined') { window.location = url; }
          };
          gtag('event', 'conversion', {
            send_to: 'AW-17425064696/VSEqCNulzYEbEPjF9fRA',
            event_callback: callback
          });
          return false;
        };

        // Defer all third-party scripts (GTM, gtag.js, AdSense) until first user interaction
        // or 6s timeout. Saves ~2-3s of main-thread work on initial load (TTI/FCP/LCP).
        var thirdPartyLoaded = false;
        var loadThirdParty = function() {
          if (thirdPartyLoaded) return;
          thirdPartyLoaded = true;

          // Google Tag Manager
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-MSSVTJPZ');

          // Google Analytics (gtag.js)
          var gs=document.createElement('script');gs.async=true;
          gs.src='https://www.googletagmanager.com/gtag/js?id=G-FDFFDKQS0Q';
          document.head.appendChild(gs);

          // Google Ads (gtag.js) — explicit loader so Cloudflare Google Tag
          // Gateway can detect and proxy the AW-17425064696 tag.
          var aws=document.createElement('script');aws.async=true;
          aws.src='https://www.googletagmanager.com/gtag/js?id=AW-17425064696';
          document.head.appendChild(aws);

          // Google AdSense is now loaded eagerly in <head> above (required for
          // Google's AdSense verification crawler). Do not load it again here.
        };

        ['pointerdown','keydown','scroll','touchstart','mousemove'].forEach(function(ev){
          window.addEventListener(ev, loadThirdParty, { once: true, passive: true });
        });
        window.setTimeout(loadThirdParty, 6000);
      });
    </script>

    <!-- App fonts (Inter + JetBrains Mono).
         Loaded with media="print" + onload swap so the request is non-render-blocking
         (browser does not delay FCP waiting for these). font-display:swap shows the
         system fallback immediately; size-adjust fallbacks in index.css prevent CLS.
         Certificate-only fonts (Playfair Display, Great Vibes) are NOT loaded here —
         CertificateTemplate.tsx loads them on demand to keep landing FCP fast. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"

  <body>
    <!-- Google Tag Manager (noscript) — only if analytics enabled -->
    <script>
      if (window.__ANALYTICS_ENABLED__) {
        document.write('<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MSSVTJPZ" height="0" width="0" style="display:none;visibility:hidden"><\/iframe><\/noscript>');
      }

    <style>
      #boot-shell {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(39, 201, 217, 0.18), transparent 34%),
          linear-gradient(180deg, #10151f 0%, #0b1018 100%);
        color: #f5f7fb;
        z-index: 9999;
      }

      #boot-shell[data-visible="true"] {
        display: flex;
      }

      .boot-shell-card {
        width: min(100%, 560px);
        border: 1px solid rgba(94, 112, 143, 0.32);
        border-radius: 20px;
        padding: 24px;
        background: rgba(10, 16, 24, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
      }

      .boot-shell-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        font: 600 12px/1.2 Inter, system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(196, 208, 229, 0.8);
      }

      .boot-shell-kicker::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #27c9d9;
        box-shadow: 0 0 18px rgba(39, 201, 217, 0.55);
      }

      .boot-shell-title {
        margin: 0;
        font: 700 clamp(28px, 5vw, 42px)/1.05 Inter, system-ui, sans-serif;
        letter-spacing: -0.03em;
      }

      .boot-shell-copy {
        margin: 12px 0 0;
        font: 400 15px/1.6 Inter, system-ui, sans-serif;
        color: rgba(214, 223, 238, 0.82);
      }

      .boot-shell-bars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
      }

      .boot-shell-bars span {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(39, 201, 217, 0.15), rgba(39, 201, 217, 0.65));
        animation: boot-pulse 1.1s ease-in-out infinite;
      }

      .boot-shell-bars span:nth-child(2) { animation-delay: 0.16s; }
      .boot-shell-bars span:nth-child(3) { animation-delay: 0.32s; }

      @keyframes boot-pulse {
        0%, 100% { opacity: 0.35; transform: scaleX(0.92); }
        50% { opacity: 1; transform: scaleX(1); }
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var shell = document.getElementById("boot-shell");
        if (!shell) return;

        var config = {
          kicker: "Loading JobLine.ai",
          title: "Preparing your workspace",
          copy: "Loading the requested page.",
        };

        if (path.startsWith("/talent/")) {
          config = {
            kicker: "Loading talent profile",
            title: "Opening public talent profile",
            copy: "Preparing the verified profile, public links, and credential summary.",
          };
          document.title = "Talent Profile | JobLine.ai";
        } else if (path.startsWith("/talent")) {
          config = {
            kicker: "Loading talent network",
            title: "Opening Talent",
            copy: "Preparing public operator profiles and employer search tools.",
          };
          document.title = "Talent | JobLine.ai";
        } else if (path.startsWith("/verify")) {
          config = {
            kicker: "Loading certificate verification",
            title: "Checking certificate route",
            copy: "Preparing the public verification view for operators and employers.",
          };
          document.title = "Certificate Verification | JobLine.ai";
        } else if (path.startsWith("/handbook")) {
          config = {
            kicker: "Loading handbook",
            title: "Opening machinist reference",
            copy: "Preparing formulas, threads, fits, speeds, and reference material.",
          };
          document.title = "Handbook | JobLine.ai";
        }

        shell.innerHTML =
          '<div class="boot-shell-card">' +
            '<div class="boot-shell-kicker">' + config.kicker + '</div>' +
            '<h1 class="boot-shell-title">' + config.title + '</h1>' +
            '<p class="boot-shell-copy">' + config.copy + '</p>' +
            '<div class="boot-shell-bars" aria-hidden="true"><span></span><span></span><span></span></div>' +
          '</div>';
        shell.setAttribute("data-visible", "true");
      })();
    </script>
    <div id="boot-shell" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
