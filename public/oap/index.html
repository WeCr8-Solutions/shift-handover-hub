<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="JobLine OAP — Operator Acceptance Program by JobLine.ai">
<title>JobLine OAP | Operator Acceptance Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── OAP DESIGN TOKENS ── */
:root {
  --oap-bg:      #080a0e;
  --oap-surface: #0d1018;
  --oap-card:    #111520;
  --oap-border:  #1c2330;
  --oap-border2: #232d3d;
  --oap-text:    #ccd6ea;
  --oap-muted:   #566070;
  --oap-muted2:  #7888a0;
  --oap-accent:  #22b6c3;
  --oap-gold:    #f5c518;
  --oap-blue:    #4a9eff;
  --oap-red:     #ff4757;
  --oap-orange:  #ff6b35;
  --oap-purple:  #a78bfa;
  --oap-head:    'Inter', sans-serif;
  --oap-body:    'Inter', sans-serif;
  --oap-mono:    'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--oap-bg);color:var(--oap-text);font-family:var(--oap-body);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.oap-header{background:var(--oap-surface);border-bottom:1px solid var(--oap-border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;min-height:54px;position:sticky;top:0;z-index:300;gap:8px;flex-wrap:wrap}
.oap-header-logo{font-family:var(--oap-head);font-weight:900;font-size:20px;letter-spacing:1px;cursor:pointer}
.oap-header-logo span{color:var(--oap-accent)}
.oap-header-logo small{display:block;font-size:9px;letter-spacing:2px;color:var(--oap-muted);font-weight:400}
.oap-nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.oap-nav-btn{font-family:var(--oap-head);font-weight:700;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--oap-border2);background:transparent;color:var(--oap-muted2);white-space:nowrap;transition:.12s}
.oap-nav-btn:hover{color:var(--oap-text)}
.oap-nav-btn.active{background:rgba(34,182,195,.1);border-color:rgba(34,182,195,.3);color:var(--oap-accent)}
.oap-nav-btn.gold{background:linear-gradient(135deg,#f5c518,#ff6b35);color:#000;border:none}

/* ── MAIN ── */
.oap-main{max-width:960px;margin:0 auto;padding:18px 14px}
@media(max-width:600px){.oap-main{padding:12px}}

/* ── HERO ── */
.oap-hero{padding:20px 0 14px}
.oap-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.oap-badge{font-family:var(--oap-mono);font-size:10px;letter-spacing:2px;padding:3px 9px;background:rgba(34,182,195,.08);color:var(--oap-accent);border:1px solid rgba(34,182,195,.2);border-radius:3px}
.oap-title{font-family:var(--oap-head);font-weight:900;font-size:24px}
.oap-hero-desc{font-size:13px;color:var(--oap-muted2);line-height:1.65;max-width:600px}

/* ── CARDS ── */
.oap-card{background:var(--oap-surface);border:1px solid var(--oap-border);border-radius:8px;padding:18px;margin-bottom:14px}
.oap-card-title{font-family:var(--oap-head);font-weight:900;font-size:15px;margin-bottom:12px;letter-spacing:.5px}
.oap-hint{font-size:11px;color:var(--oap-muted);line-height:1.5}
.oap-hint-inline{font-size:11px;color:var(--oap-muted)}
.oap-empty{font-size:12px;color:var(--oap-muted);padding:8px 0}
.oap-link{color:var(--oap-accent);cursor:pointer}
.oap-link:hover{text-decoration:underline}

/* ── SETUP CTA ── */
.oap-setup-cta{background:var(--oap-surface);border:1px solid var(--oap-border);border-radius:10px;padding:40px 24px;text-align:center;margin-bottom:16px}
.oap-setup-icon{font-size:48px;margin-bottom:12px}
.oap-setup-cta h2{font-family:var(--oap-head);font-weight:900;font-size:24px;margin-bottom:8px}
.oap-setup-cta p{font-size:13px;color:var(--oap-muted2);max-width:480px;margin:0 auto 18px;line-height:1.65}

/* ── STATS GRID ── */
.oap-dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.oap-dash-grid{grid-template-columns:1fr 1fr}}
.oap-stat-card{background:var(--oap-surface);border:1px solid var(--oap-border);border-radius:8px;padding:14px;text-align:center}
.oap-stat-val{font-family:var(--oap-mono);font-size:26px;color:var(--oap-accent);line-height:1}
.oap-stat-label{font-family:var(--oap-head);font-weight:700;font-size:12px;margin-top:4px}
.oap-stat-sub{font-size:10px;color:var(--oap-muted)}

/* ── SECTION GRID ── */
.oap-section-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.oap-section-grid{grid-template-columns:1fr}}

/* ── ACTIONS LIST ── */
.oap-action-list{display:flex;flex-direction:column;gap:7px}
.oap-action-btn{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:5px;padding:10px 13px;font-family:var(--oap-head);font-weight:700;font-size:12px;color:var(--oap-text);cursor:pointer;text-align:left;transition:.12s;letter-spacing:.3px}
.oap-action-btn:hover{border-color:var(--oap-accent);color:var(--oap-accent)}

/* ── MENTEE ROWS ── */
.oap-mentee-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--oap-border);cursor:pointer}
.oap-mentee-row:last-child{border-bottom:none}
.oap-mentee-row:hover{opacity:.85}
.oap-mentor-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--oap-border)}
.oap-prog-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--oap-border)}
.oap-course-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--oap-border);cursor:pointer}
.oap-course-row:hover{opacity:.85}
.oap-avatar{width:36px;height:36px;border-radius:50%;background:var(--oap-accent);color:#000;font-family:var(--oap-head);font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oap-avatar-lg{width:48px;height:48px;font-size:22px}
.oap-mentee-name{font-family:var(--oap-head);font-weight:700;font-size:14px}
.oap-mentee-role{font-size:11px;color:var(--oap-muted)}
.oap-prog-name{font-family:var(--oap-head);font-weight:700;font-size:14px}
.oap-prog-icon{font-size:22px;width:32px;flex-shrink:0}
.oap-pct{font-family:var(--oap-mono);font-size:13px;color:var(--oap-accent);flex-shrink:0}

/* ── PROGRESS BAR ── */
.oap-prog-bar{background:var(--oap-border);height:3px;border-radius:2px;overflow:hidden;margin-top:4px}
.oap-prog-fill{height:100%;background:var(--oap-accent);border-radius:2px;transition:width .4s}
.oap-course-prog{background:var(--oap-border);height:4px;border-radius:2px;margin-bottom:12px}
.oap-course-fill{height:100%;background:var(--oap-accent);border-radius:2px;transition:width .3s}

/* ── BUTTONS ── */
.oap-btn-primary{background:var(--oap-accent);color:#000;border:none;border-radius:5px;padding:10px 20px;font-family:var(--oap-head);font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:.12s;white-space:nowrap}
.oap-btn-primary:hover{opacity:.85}
.oap-btn-ghost{background:transparent;color:var(--oap-muted2);border:1px solid var(--oap-border2);border-radius:5px;padding:10px 16px;font-family:var(--oap-head);font-weight:700;font-size:12px;cursor:pointer;transition:.12s;white-space:nowrap}
.oap-btn-ghost:hover{color:var(--oap-text);border-color:var(--oap-text)}
.oap-btn-sm{background:var(--oap-card);border:1px solid var(--oap-border2);color:var(--oap-muted2);border-radius:4px;padding:5px 11px;font-family:var(--oap-head);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap}
.oap-btn-sm:hover{color:var(--oap-text)}
.oap-btn-xs{background:var(--oap-card);border:1px solid var(--oap-border2);color:var(--oap-accent);border-radius:3px;padding:3px 8px;font-family:var(--oap-head);font-weight:700;font-size:10px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.oap-btn-undo{color:var(--oap-muted)}

/* ── TABS ── */
.oap-tabs{display:flex;border-bottom:1px solid var(--oap-border);margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.oap-tab{padding:8px 14px;font-family:var(--oap-head);font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;color:var(--oap-muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.12s;flex-shrink:0}
.oap-tab:hover{color:var(--oap-text)}
.oap-tab.active{color:var(--oap-accent);border-bottom-color:var(--oap-accent)}

/* ── PAGE HEADER ── */
.oap-page-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.oap-page-header h1{font-family:var(--oap-head);font-weight:900;font-size:22px}
.oap-back{background:transparent;border:1px solid var(--oap-border2);color:var(--oap-muted2);border-radius:4px;padding:6px 12px;font-family:var(--oap-head);font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.5px}
.oap-back:hover{color:var(--oap-text)}

/* ── FORMS ── */
.oap-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.oap-form-grid{grid-template-columns:1fr}}
.oap-form-section{margin-top:16px}
.oap-form-label{font-family:var(--oap-head);font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--oap-muted);margin-bottom:8px}
.oap-field{display:flex;flex-direction:column;gap:4px}
.oap-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--oap-muted)}
.oap-input,.oap-select{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:4px;padding:8px 11px;color:var(--oap-text);font-family:var(--oap-body);font-size:13px;outline:none;width:100%;transition:.12s}
.oap-input:focus,.oap-select:focus{border-color:var(--oap-accent)}
.oap-select option{background:var(--oap-surface)}
.oap-check-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:12px;cursor:pointer;border-bottom:1px solid var(--oap-border)}
.oap-check-row:last-child{border-bottom:none}
.oap-check-row input{flex-shrink:0;margin-top:2px}
.oap-check-sm{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;cursor:pointer}
.oap-check-sm input{flex-shrink:0}
.oap-req-badge{font-size:8px;background:rgba(255,71,87,.1);color:#ff7a87;border:1px solid rgba(255,71,87,.2);border-radius:2px;padding:1px 5px;letter-spacing:.5px}
.oap-precision{font-size:9px;color:var(--oap-muted);font-family:var(--oap-mono)}

/* ── ROLE GRID ── */
.oap-role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
@media(max-width:480px){.oap-role-grid{grid-template-columns:1fr 1fr}}
.oap-role-card{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:6px;padding:11px 12px;font-family:var(--oap-head);font-weight:700;font-size:12px;cursor:pointer;transition:.12s;line-height:1.4}
.oap-role-card:hover{border-color:var(--oap-accent)}
.oap-role-card.selected{background:rgba(34,182,195,.07);border-color:var(--oap-accent);color:var(--oap-accent)}

/* ── EQUIPMENT GRID ── */
.oap-equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-height:260px;overflow-y:auto;padding:4px;border:1px solid var(--oap-border);border-radius:5px}
@media(max-width:480px){.oap-equip-grid{grid-template-columns:1fr}}
.oap-equip-cat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--oap-muted);margin-bottom:4px;font-weight:700}
.oap-equip-cat{margin-bottom:8px}

/* ── SCHEDULE ── */
.oap-sched-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.oap-sched-opt{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:6px;padding:12px;cursor:pointer;transition:.12s}
.oap-sched-opt:hover{border-color:var(--oap-accent)}
.oap-sched-opt.selected{background:rgba(34,182,195,.05);border-color:var(--oap-accent)}
.oap-sched-card{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:6px;padding:14px;margin-bottom:10px}
.oap-sched-title{font-family:var(--oap-head);font-weight:900;font-size:14px;margin-bottom:4px}
.oap-sched-timeline{margin-top:10px}
.oap-sched-week{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid var(--oap-border);font-size:11px}
.oap-sched-wk{font-family:var(--oap-mono);font-size:10px;color:var(--oap-muted);min-width:30px;flex-shrink:0}
.oap-sched-sec{font-family:var(--oap-head);font-weight:700;min-width:80px;flex-shrink:0}
.oap-sched-tasks{color:var(--oap-muted2)}

/* ── SECTION FLOW (OAK tracker) ── */
.oap-section-card{background:var(--oap-surface);border:1px solid var(--oap-border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.oap-section-card.oap-locked{opacity:.5}
.oap-sec-header{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer}
.oap-sec-header:hover{background:rgba(255,255,255,.02)}
.oap-sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.oap-sec-dot-lg{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.oap-sec-label{font-family:var(--oap-head);font-weight:700;font-size:13px}
.oap-sec-body{padding:0 15px 14px}
.oap-sec-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--oap-border)}
.oap-sec-row:last-child{border-bottom:none}
.oap-section-list{display:flex;flex-direction:column;gap:0}

/* ── CHECKPOINTS ── */
.oap-cp-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--oap-border)}
.oap-cp-row:last-child{border-bottom:none}
.oap-cp-row.done .oap-cp-label{color:var(--oap-muted);text-decoration:line-through}
.oap-cp-check{width:22px;height:22px;border-radius:50%;border:1px solid var(--oap-border2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;cursor:pointer;transition:.12s;margin-top:1px}
.oap-cp-row.done .oap-cp-check{background:rgba(34,182,195,.1);border-color:var(--oap-accent);color:var(--oap-accent)}
.oap-cp-check:hover{border-color:var(--oap-accent);color:var(--oap-accent)}
.oap-cp-label{font-size:12px;line-height:1.5;overflow-wrap:break-word}
.oap-cp-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.oap-cp-type{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--oap-muted);font-family:var(--oap-mono)}
.oap-cp-badge{font-size:8px;background:rgba(74,158,255,.07);color:var(--oap-blue);border:1px solid rgba(74,158,255,.15);border-radius:2px;padding:1px 5px;letter-spacing:.5px}
.oap-cp-emp{background:rgba(255,107,53,.07);color:var(--oap-orange);border-color:rgba(255,107,53,.15)}
.oap-cp-course{font-size:9px;color:var(--oap-accent);cursor:pointer;padding:1px 5px;border:1px solid rgba(34,182,195,.2);border-radius:2px}
.oap-cp-course:hover{background:rgba(34,182,195,.07)}
.oap-cp-signed{font-size:10px;color:var(--oap-muted);margin-top:2px;font-family:var(--oap-mono)}
.oap-badge-sm{font-size:9px;background:rgba(34,182,195,.06);color:var(--oap-accent);border:1px solid rgba(34,182,195,.12);border-radius:3px;padding:2px 7px;font-family:var(--oap-mono);white-space:nowrap;flex-shrink:0}

/* ── MENTEE NOTES ── */
.oap-notes-block{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:5px;padding:10px;margin-top:12px}
.oap-notes-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--oap-muted);margin-bottom:6px}
.oap-notes-ta{width:100%;background:var(--oap-surface);border:1px solid var(--oap-border);border-radius:4px;padding:8px;color:var(--oap-text);font-family:var(--oap-body);font-size:12px;min-height:60px;resize:vertical;outline:none;margin-bottom:7px}
.oap-notes-ta:focus{border-color:var(--oap-accent)}

/* ── COURSE ── */
.oap-course-content{font-size:13px;line-height:1.75;overflow-wrap:break-word}
.oap-quiz-q{font-size:13px;font-weight:500;margin-bottom:11px;line-height:1.65;overflow-wrap:break-word}
.oap-quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:11px}
.oap-qopt{background:var(--oap-card);border:1px solid var(--oap-border);border-radius:5px;padding:10px 12px;cursor:pointer;font-size:12px;transition:.12s;display:flex;align-items:flex-start;gap:9px;overflow-wrap:break-word}
.oap-qopt:hover{border-color:var(--oap-accent)}
.oap-qopt.correct{background:rgba(34,182,195,.07);border-color:#22b6c3;color:#22b6c3}
.oap-qopt.wrong{background:rgba(255,71,87,.05);border-color:#ff4757;color:#ff7a87}
.oap-qopt-l{font-family:var(--oap-mono);font-size:10px;width:18px;min-width:18px;height:18px;border:1px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.oap-quiz-fb{font-size:12px;padding:10px 12px;border-radius:5px;display:none;margin-bottom:10px;line-height:1.6;overflow-wrap:break-word}
.oap-quiz-fb.show{display:block}
.oap-quiz-fb.correct{background:rgba(34,182,195,.06);border:1px solid rgba(34,182,195,.15);color:#80d8b8}
.oap-quiz-fb.wrong{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.12);color:#ff9aa8}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--oap-border2);border-radius:3px}

/* ── FOOTER ── */
.oap-footer{border-top:1px solid var(--oap-border);padding:16px;text-align:center;font-size:11px;color:var(--oap-muted);margin-top:20px}
.oap-footer a{color:var(--oap-accent);text-decoration:none}
</style>
</head>
<body>

<header class="oap-header">
  <div class="oap-header-logo" onclick="oapSetView('home')">
    Job<span>Line</span>
    <small>OPERATOR ACCEPTANCE PROGRAM</small>
  </div>
  <nav class="oap-nav">
    <button class="oap-nav-btn" onclick="oapSetView('home')">🏠 Dashboard</button>
    <button class="oap-nav-btn" onclick="oapSetView('employer')">🏢 Employer</button>
    <button class="oap-nav-btn" onclick="oapSetView('program','list')">📋 Programs</button>
    <button class="oap-nav-btn" onclick="oapSetView('mentor','list')">👤 Mentors</button>
    <button class="oap-nav-btn" onclick="oapSetView('mentee','list')">🧑‍🏭 Operators</button>
    <button class="oap-nav-btn gold" onclick="oapSetView('standalone')">🎓 Get Certified</button>
  </nav>
</header>

<main class="oap-main">
  <div id="oap-root"><!-- rendered by engine --></div>
</main>

<footer class="oap-footer">
  <p><strong>JobLine OAP</strong> · Operator Acceptance Program · <a href="https://jobline.ai">jobline.ai</a> · <a href="https://jobline.ai">jobline.ai</a></p>
  <p style="margin-top:4px;font-size:9px">© 2026 JobLine.ai · Certificates are portable and may be presented to any employer</p>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════════
// OAP-TYPES.JS — JobLine Operator Acceptance Program
// Typed constants, enums, and schema definitions
// All equipment, tools, roles, and checkpoints live here —

      { id:'sg2', title:'Emergency Stop & Procedures',
        content:`<strong>Know before you press Cycle Start:</strong><br><br>
<strong style="color:var(--red)">Emergency Stop (E-Stop):</strong> The large red mushroom button. Cuts all power to axes and spindle instantly. Know its location before anything moves.<br><br>
<strong style="color:var(--accent)">Fire:</strong> Know the nearest fire extinguisher location and the nearest exit. RACE: Rescue, Alarm, Contain, Extinguish/Evacuate.<br><br>
<strong style="color:var(--accent)">Medical emergency:</strong> Know the location of the first aid kit, AED, and eyewash station. Know who the trained first responders are.<br><br>
<strong style="color:var(--accent)">Chemical spill:</strong> SDS (Safety Data Sheet) binder location. Spill kit location. Ventilation procedure.`,
        quiz: { q:'What does pressing the E-Stop button do?', opts:['Pauses the program at the next line','Cuts all power to axes and spindle immediately','Retracts the tool to home position','Opens the machine door'], ans:1, fb:'E-Stop immediately kills all powered motion — spindle, axes, coolant. It is the universal emergency cut-off on all CNC equipment.' }
      },
      { id:'sg3', title:'Housekeeping & Machine Guarding',
        content:`<strong>A clean shop is a safe shop:</strong><br><br>
<strong style="color:var(--accent)">Machine guards:</strong> NEVER remove or bypass a machine guard. Guards are required by OSHA and are there to prevent contact with hazardous moving parts. If a guard is missing or damaged, red-tag the machine and report it immediately.<br><br>
<strong style="color:var(--accent)">Floor cleanliness:</strong> Oil or coolant on floors causes slips that send people into machines. Report spills immediately. Use absorbent materials. Chip conveyors must be kept clear.<br><br>
<strong style="color:var(--accent)">Aisle clearance:</strong> Fire exits, electrical panels, and emergency equipment must be accessible at all times. Minimum 36" aisle clearance required by code.`,
        quiz: { q:'You notice the door guard on a lathe is cracked and partially blocked. What is the correct action?', opts:['Continue using the machine carefully','Remove the guard so it does not interfere','Red-tag the machine, do not operate it, report to supervisor immediately','Tape the crack and continue'], ans:2, fb:'A damaged guard must be reported and the machine taken out of service until repaired. Operating without proper guarding violates OSHA 1910.212 and puts lives at risk.' }
      },
    ],
  },

  safety_loto: {
    id: 'safety_loto', label: 'Lockout / Tagout (LOTO)', icon: '🔐',
    section: 'safety', linkedSafety: 'lockout_tagout', duration: '30 min',
    passMark: 90, required: true,
    desc: 'OSHA 29 CFR 1910.147 — control of hazardous energy.',
    topics: [
      { id:'loto1', title:'What is LOTO and When is it Required?',
        content:`<strong>LOTO (Lockout/Tagout)</strong> is required any time you:<br><br>
• Perform maintenance, repair, or adjustment on equipment<br>
• Clear jams or blockages<br>
• Change tooling when a power source is involved<br>
• Service electrical, hydraulic, pneumatic, or mechanical systems<br><br>
<strong style="color:var(--red)">The hazard:</strong> Unexpected energization or startup of equipment causes approximately 50,000 injuries and 120 deaths per year in the US (OSHA data). CNC machines store multiple energy sources: electrical, hydraulic (clamping), pneumatic, gravity (axes that can drop).<br><br>
<strong style="color:var(--accent)">OSHA Standard:</strong> 29 CFR 1910.147 mandates written procedures, trained personnel, and proper equipment for all lockout operations.`,
        quiz: { q:'You need to clear a chip jam inside the machine. The E-Stop is pressed. Is this sufficient before reaching inside?', opts:['Yes — E-Stop cuts all power','No — you must follow full LOTO procedure including mechanical lockout of all energy sources','Yes — if the spindle is stopped','Only if a supervisor is present'], ans:1, fb:'E-Stop alone is not LOTO. Hydraulic clamping, pneumatic systems, and stored mechanical energy (axes under gravity) can still be active. Full LOTO procedure is required.' }
      },
      { id:'loto2', title:'LOTO Procedure Steps',
        content:`<strong>OSHA-compliant LOTO sequence:</strong><br><br>
<strong style="color:var(--accent)">1. Notify</strong> — Tell all affected employees the machine is being locked out.<br>
<strong style="color:var(--accent)">2. Identify energy sources</strong> — Electrical, hydraulic, pneumatic, gravity, thermal.<br>
<strong style="color:var(--accent)">3. Shut down</strong> — Use normal stopping procedures.<br>
<strong style="color:var(--accent)">4. Isolate</strong> — Turn off / disconnect all energy isolation devices (main disconnect, air valve, hydraulic shutoff).<br>
<strong style="color:var(--accent)">5. Apply lockout device</strong> — Your personal padlock goes on EVERY isolation point.<br>
<strong style="color:var(--accent)">6. Release / restrain stored energy</strong> — Bleed pneumatics, block axes, discharge capacitors.<br>
<strong style="color:var(--accent)">7. Verify</strong> — Try to start the machine. Verify it will NOT energize before reaching in.<br><br>
<strong style="color:var(--red)">ONE person = ONE lock. Only you remove your lock. Never remove another person's lock.</strong>`,
        quiz: { q:'You applied your lock to the main disconnect. A co-worker needs to also work on the same machine. What must happen?', opts:['Your lock covers both workers — one lock is fine','The co-worker must apply THEIR OWN padlock to the same isolation point using a hasp','Only the supervisor needs a lock','A tagout alone is sufficient for the second person'], ans:1, fb:'Each authorized employee who is working on the equipment must apply their own personal padlock. This ensures the machine cannot be re-energized until every worker has cleared and removed their own lock.' }
      },
    ],
  },

  safety_fire: {
    id: 'safety_fire', label: 'Fire Extinguisher Operation', icon: '🧯',
    section: 'safety', linkedSafety: 'fire_ext', duration: '20 min',
    passMark: 90, required: true,
    desc: 'PASS method, extinguisher types, fire classes, when NOT to fight.',
    topics: [
      { id:'fire1', title:'Fire Classes & Extinguisher Types',
        content:`<strong>Know your fire class before reaching for an extinguisher:</strong><br><br>
<strong style="color:var(--accent)">Class A:</strong> Ordinary combustibles — wood, paper, cardboard, cloth. Water or ABC extinguisher.<br>
<strong style="color:var(--accent)">Class B:</strong> Flammable liquids — oil, grease, coolant, hydraulic fluid, solvents. CO₂, dry chemical, or ABC.<br>
<strong style="color:var(--accent)">Class C:</strong> Electrical fires — live electrical equipment, control panels, motors. CO₂ or dry chemical ONLY. Never water.<br>
<strong style="color:var(--accent)">Class D:</strong> Combustible metals — magnesium chips, titanium, aluminum swarf. Class D extinguisher ONLY. Standard extinguishers can make it worse.<br>
<strong style="color:var(--accent)">Class K:</strong> Cooking oils/fats — not common in machining.<br><br>
<strong style="color:var(--gold)">Most common in machining shops:</strong> ABC dry chemical (multipurpose) and CO₂. Always verify rating before fire breaks out — not during.`,
        quiz: { q:'A CNC machine control panel is smoking and flames are visible. Which extinguisher type should you use?', opts:['Water extinguisher — fastest knockdown','Class A dry chemical','CO₂ or ABC dry chemical — never water on electrical','Class D metal fire extinguisher'], ans:2, fb:'Electrical fires (Class C) require CO₂ or dry chemical. Water conducts electricity and will electrocute the person using it and spread the fire. Never use water on live electrical fires.' }
      },
      { id:'fire2', title:'PASS Method & When to Evacuate',
        content:`<strong>The PASS Method — the only way to use a fire extinguisher:</strong><br><br>
<strong style="color:var(--red)">P</strong> — <strong>Pull</strong> the pin (breaks the tamper seal)<br>
<strong style="color:var(--red)">A</strong> — <strong>Aim</strong> at the BASE of the fire, not the flames<br>
<strong style="color:var(--red)">S</strong> — <strong>Squeeze</strong> the handle<br>
<strong style="color:var(--red)">S</strong> — <strong>Sweep</strong> side to side across the base<br><br>
<strong style="color:var(--gold)">When NOT to fight a fire (evacuate immediately):</strong><br>
• The fire is larger than a wastebasket<br>
• You don't know what's burning<br>
• The fire is spreading rapidly<br>
• You don't have the right extinguisher type<br>
• There is smoke obscuring your exit path<br>
• Your instinct says GET OUT — trust it<br><br>
<strong>Your safety is more important than the equipment.</strong>`,
        quiz: { q:'Using the PASS method, where do you aim the extinguisher?', opts:['At the flames to knock them down','At the top of the fire','At the base of the fire','At the fuel source above the fire line'], ans:2, fb:'Always aim at the BASE of the fire — the fuel/heat interface. Aiming at flames just pushes them around without eliminating the heat source. Sweep side to side at the base.' }
      },
    ],
  },

  safety_hazcom: {
    id: 'safety_hazcom', label: 'HazCom / GHS / SDS', icon: '⚗️',
    section: 'safety', linkedSafety: 'hazcom', duration: '25 min',
    passMark: 80, required: true,
    desc: 'OSHA Hazard Communication Standard — SDS sheets, GHS labels, chemical handling.',
    topics: [
      { id:'haz1', title:'GHS Labels & Pictograms',
        content:`<strong>Every chemical container must have a GHS-compliant label:</strong><br><br>
<strong style="color:var(--accent)">Product identifier</strong> — Name or code on the SDS<br>
<strong style="color:var(--accent)">Signal word</strong> — "DANGER" (severe) or "WARNING" (moderate)<br>
<strong style="color:var(--accent)">Hazard statements</strong> — Specific nature of the hazard<br>
<strong style="color:var(--accent)">Precautionary statements</strong> — PPE and handling instructions<br>
<strong style="color:var(--accent)">Supplier info</strong> — Name, address, phone<br>
<strong style="color:var(--accent)">Pictograms</strong> — 9 standardized GHS symbols (flame, skull & crossbones, corrosion, etc.)<br><br>
In a machining shop you regularly encounter: cutting fluids (coolant), lubricants, parts washer solvents, rust preventives, thread-cutting oils, and grinding compounds — all require SDS sheets.`,
        quiz: { q:'A container of coolant concentrate has no label. What should you do?', opts:['Use it — coolant is generally safe','Smell it to identify it','Do not use it. Label it as unknown, remove from service, contact supervisor','Ask a coworker if they know what it is'], ans:2, fb:'An unlabeled chemical must NEVER be used. OSHA HazCom requires proper labeling on all hazardous chemicals. Remove from service and contact a supervisor for identification.' }
      },
    ],

  // ── MATERIAL HANDLING COURSES ─────────────────────────────────
  material_handling: {
    id: 'material_handling', label: 'Raw Material Handling & Saw Operation', icon: '📦',
    section: 'materials', duration: '45 min',
    passMark: 80, required: true,
    desc: 'Material identification, storage, handling procedures, bandsaw/cold saw operation.',
    topics: [
      { id:'mat1', title:'Raw Material Identification',
        content:`<strong>Every material in the shop has specific handling requirements:</strong><br><br>
<strong style="color:var(--accent)">Aluminum (6061, 7075, 2024):</strong> Lightweight, soft, sharp burrs. Cuts easily. Chips are stringy and can be sharp. Handle with leather gloves at edges.<br><br>
<strong style="color:var(--accent)">Steel (1018, 4140, 4340, 17-4 SS):</strong> Heavy — get help or use a hoist for anything over 50 lbs. Mill scale on hot-rolled is rough and abrasive. Stainless work-hardens — handle edges carefully.<br><br>
<strong style="color:var(--accent)">Titanium:</strong> Looks like steel but weighs ~60% as much. Combustible chips — DO NOT grind without proper precautions. Very heat-sensitive when cutting.<br><br>
<strong style="color:var(--accent)">Brass / Copper:</strong> Dense, heavy. Chips are curly and sharp. Can tarnish tooling quickly.<br><br>
<strong style="color:var(--accent)">Material tags / certs:</strong> Every piece of raw material should have a tag (heat number, alloy, spec). Never remove tags until the job is complete. In aerospace and medical, lost certs = scrap.`,
        quiz: { q:'You receive a bar of material with no identifying tag. What is the correct action?', opts:['Assume it is 6061 aluminum since most jobs use it','Test it with a magnet to figure it out','Quarantine the material, do not use it, notify your supervisor to verify the material cert','Use it for a practice piece first'], ans:2, fb:'Unidentified material must never be used in production. In regulated industries (aerospace, medical), material traceability is mandatory. An unlabeled bar could be the wrong alloy entirely.' }
      },
      { id:'mat2', title:'Bandsaw & Cold Saw Safety',
        content:`<strong>Saw operation is one of the highest injury-risk operations in a job shop:</strong><br><br>
<strong style="color:var(--accent)">Before cutting:</strong><br>
• Verify blade condition — check for missing teeth, cracks, proper tension<br>
• Set the blade guide to within ¼" of the material<br>
• Confirm vise/clamp is fully secured — material must not shift during cut<br>
• Clear chips from the previous cut and verify coolant flow (cold saw)<br><br>
<strong style="color:var(--accent)">During cutting:</strong><br>
• Never put your hands in the blade path<br>
• Use push sticks or clamps for small pieces<br>
• Let the saw do the work — do not force feed<br>
• Keep eyes on the cut — watch for blade wandering<br><br>
<strong style="color:var(--accent)">After cutting:</strong><br>
• Let the blade fully stop before reaching near it<br>
• Deburr cut ends before handling — freshly cut metal is razor sharp<br>
• Tag the cut piece immediately with job/material info`,
        quiz: { q:'You are about to cut a small 3" piece of round stock on the bandsaw. The piece is too short to hold safely by hand. What do you do?', opts:['Hold it as carefully as possible — it will be quick','Use the vise/clamp to secure it — never hold small pieces by hand near the blade','Ask someone to hold it steady while you cut','Skip the cut and order the right size'], ans:1, fb:'Small pieces must always be clamped. Hands near the blade is never acceptable regardless of how short the cut will be. The vise exists for exactly this situation.' }
      },
    ],
  },

  // ── MEASURING COURSES ─────────────────────────────────────────
  measuring_basic: {
    id: 'measuring_basic', label: 'Basic Measurement — Tape, Rule & Caliper', icon: '📏',
    section: 'measuring', duration: '40 min',
    passMark: 85, required: true,
    linkedEquip: ['tape_25','steel_rule','caliper_6','caliper_vernier'],
    desc: 'Tape measure, steel rule, digital caliper, vernier caliper — read and use correctly.',
    topics: [
      { id:'meas1', title:'Tape Measure & Steel Rule',
        content:`<strong>The starting point of all dimensional awareness:</strong><br><br>
<strong style="color:var(--accent)">Tape measure hook:</strong> The hook at the end floats by exactly 1/16" — this is intentional. It accounts for hook thickness in inside vs outside measurements. Never force it tight for an inside measurement.<br><br>
<strong style="color:var(--accent)">Reading fractions:</strong> Most tapes read to 1/16". Count tick marks from the last inch. The longest mark = 1/2". Medium marks = 1/4" and 3/4". Shorter = 1/8" increments. Shortest = 1/16".<br><br>
<strong style="color:var(--accent)">Steel rule:</strong> Reads to 1/64" or 1/100" (decimal). For precision layout and short measurements. Never use as a straightedge for scribing unless it is a true straight rule.`,
        quiz: { q:'A tape measure reads 4 full inches plus 3 marks past the 1/2" line (counting by 1/8" increments). What is the measurement?', opts:['4-3/4"','4-7/8"','4-5/8"','4-1/2"'], ans:1, fb:'1/2" + 3 × 1/8" = 4/8" + 3/8" = 7/8". Answer: 4-7/8". Always count from the last inch, not from zero.' }
      },
      { id:'meas2', title:'Digital Caliper Use & Care',
        content:`<strong>The caliper is the most-used precision tool in a machine shop:</strong><br><br>
<strong style="color:var(--accent)">Four ways to measure:</strong><br>
1. <strong>Outside jaws (bottom)</strong> — OD, thickness, length<br>
2. <strong>Inside jaws (top small jaws)</strong> — ID, slot width<br>
3. <strong>Depth rod</strong> — hole depth, shoulder depth<br>
4. <strong>Step measurement</strong> — shoulder height<br><br>
<strong style="color:var(--accent)">Zero/calibrate:</strong> Always close and zero before measuring. With inch/mm calipers, verify the display is in the correct unit.<br><br>
<strong style="color:var(--accent)">Care:</strong> Never drop. Keep clean — chips in the rail cause inaccurate readings. Store in case. Check calibration annually or after drops. Resolution: 0.0005" (digital). Do not use as a scribe or pry tool.`,
        quiz: { q:'You are measuring a bore with a caliper. The display reads 1.2530" but the drawing calls for 1.253±0.002". Is this part in spec?', opts:['Yes — 1.2530" is within ±0.002" of 1.253"','No — the measurement is over by 0.003"','Cannot determine from caliper reading alone','Yes — all caliper readings are within spec by default'], ans:0, fb:'1.253" ± 0.002" = 1.251" to 1.255". The reading 1.2530" falls within that range. Part is in spec.' }
      },
    ],
  },

  measuring_precision: {
    id: 'measuring_precision', label: 'Precision Measurement — Micrometer & Gauges', icon: '🎯',
    section: 'measuring', duration: '45 min',
    passMark: 85, required: true,
    linkedEquip: ['mic_outside','mic_inside','mic_depth','bore_gauge','thread_ring','thread_plug'],
    desc: 'Outside/inside/depth micrometers, bore gauges, thread gauges — read to 0.0001".',
    topics: [
      { id:'mic1', title:'Outside Micrometer Reading',
        content:`<strong>The micrometer reads to 0.0001" — 10x finer than a caliper:</strong><br><br>
<strong style="color:var(--accent)">The thimble:</strong> One full turn = 0.025". The sleeve has marks at 0.025" intervals. The thimble has 25 divisions (each = 0.001").<br><br>
<strong style="color:var(--accent)">Reading steps:</strong><br>
1. Read the whole + quarter-turn marks visible on the sleeve (e.g., 0.275")<br>
2. Add the thimble line reading (e.g., 18 = 0.018")<br>
3. Add vernier line if present (e.g., 2 = 0.0002")<br>
Total: 0.2932"<br><br>
<strong style="color:var(--accent)">Ratchet / friction thimble:</strong> Always use the ratchet stop for consistent gaging force. Never overtighten — it distorts the part and the measurement.<br><br>
<strong style="color:var(--accent)">Zeroing:</strong> Clean faces, close on setting standard or direct zero contact, adjust sleeve index to 0.`,
        quiz: { q:'A micrometer sleeve shows 0.250" visible plus the thimble reads 14.5. What is the measurement?', opts:['0.2645"','0.2645"','0.2645"','0.2650"'], ans:0, fb:'0.250" + (14.5 × 0.001") = 0.250" + 0.0145" = 0.2645". Always: sleeve + thimble + vernier (if equipped).' }
      },
      { id:'mic2', title:'Bore Gauge & Thread Gauges',
        content:`<strong>Measuring inside diameters and thread acceptance:</strong><br><br>
<strong style="color:var(--accent)">Bore gauge:</strong> A telescoping or dial bore gauge measures IDs that a caliper can't reliably reach. Set the gauge in the bore, rock to find minimum reading, then measure the set dimension with an outside mic. The bore gauge + micrometer combination gives you true bore size to 0.0001".<br><br>
<strong style="color:var(--accent)">Thread plug gauges (GO/NOGO):</strong><br>
• GO gauge must enter freely — thread is not undersized<br>
• NOGO gauge must NOT enter — thread is not oversized<br>
• If NOGO enters: the thread is out of tolerance. Reject the part.<br><br>
<strong style="color:var(--accent)">Pi tape / OD tape:</strong> Wraps around a cylinder to read the circumference as a diameter. Used for large ODs that won't fit in a mic. Accurate to 0.001".`,
        quiz: { q:'You check a threaded hole with a 1/2-13 UNC thread plug gauge. The GO gauge enters. The NOGO gauge also enters. What does this mean?', opts:['The thread is perfect — both gauges should enter','The thread is acceptable — NOGO just means optional check','The thread is OUT OF TOLERANCE — too large. Reject the part.','Re-tap the thread and check again before deciding'], ans:2, fb:'NOGO entering means the thread is oversized (pitch diameter too large). The part must be rejected. Re-tapping will only make it worse. The hole may be reworkable by inserts in some cases — but it is definitely out of tolerance as-is.' }
      },
    ],
  },

  // ── TOOLING COURSES ───────────────────────────────────────────
  tooling_id: {
    id: 'tooling_id', label: 'Tool Identification & Holders', icon: '🔧',
    section: 'tooling', duration: '50 min',
    passMark: 80, required: true,
    linkedEquip: ['endmill_flat','endmill_ball','drill_hss','drill_carbide','tap_hss','tap_spiral','collet_er','tool_holder_ext','insert_turning'],
    desc: 'End mills, drills, taps, turning inserts, tool holders — identify, select, and handle correctly.',
    topics: [
      { id:'tool1', title:'End Mills — Types & Selection',
        content:`<strong>End mills are the backbone of milling operations:</strong><br><br>
<strong style="color:var(--accent)">Flat (Square) End Mill:</strong> General purpose — slots, pockets, contouring, facing. 2-flute for aluminum (chip evacuation), 4-flute for steel (strength, finish).<br><br>
<strong style="color:var(--accent)">Ball Nose End Mill:</strong> Produces 3D contoured surfaces. Radius on tip = half the tool diameter. Used for mold work, sculpted surfaces, ramp-ins.<br><br>
<strong style="color:var(--accent)">Bull Nose (Corner Radius):</strong> Flat floor with a radius corner. More rigid than ball nose. Used for floor finishing and mold cavities where a corner break is needed.<br><br>
<strong style="color:var(--accent)">Key markings:</strong> Diameter is stamped on shank (e.g., "1/2" or "12mm"). Number of flutes usually visible. Length of cut (LOC) and overall length (OAL) matter for reach.`,
        quiz: { q:'You need to rough out a large aluminum pocket. Which end mill geometry and flute count is most appropriate?', opts:['4-flute carbide ball nose','2-flute flat end mill — better chip evacuation in aluminum','4-flute flat end mill — more flutes = faster material removal in aluminum','Single-flute insert mill'], ans:1, fb:'Aluminum produces long, stringy chips that need room to escape. 2-flute end mills have larger flute valleys for chip evacuation, preventing re-cutting and built-up edge. 4-flute mills work in aluminum only with aggressive chip thinning or peck strategies.' }
      },
      { id:'tool2', title:'Drills & Taps',
        content:`<strong>Hole-making is the most common operation in a machine shop:</strong><br><br>
<strong style="color:var(--accent)">HSS vs Carbide drills:</strong> HSS is flexible (forgiving of runout), carbide is faster and holds size better but is brittle. Always start with a spot drill or center drill to prevent walking.<br><br>
<strong style="color:var(--accent)">Tap selection:</strong><br>
• <strong>Spiral point (gun tap):</strong> Pushes chips forward — for through holes<br>
• <strong>Spiral flute:</strong> Pulls chips upward — for blind holes<br>
• <strong>Form/roll tap:</strong> Displaces material (no chips) — strongest thread, for ductile materials<br><br>
<strong style="color:var(--accent)">Tap drill size:</strong> Tap drill = major diameter − (1/number of threads per inch). Example: 1/4-20 UNC → 0.250 − 0.050 = 0.200" ≈ #7 drill (0.201"). Always verify with a tap drill chart — memorizing is not enough.`,
        quiz: { q:'You are tapping a blind hole in aluminum. Which tap type should you select?', opts:['Spiral point (gun tap) — chips go forward','Spiral flute tap — pulls chips out of the blind hole','Straight flute tap — neutral chip direction','Form tap — no chips at all is always best'], ans:1, fb:'Spiral flute taps pull chips upward and out of the blind hole. A gun tap would pack chips at the bottom, cause tap breakage, and potentially destroy the part. Form taps are a valid alternative for aluminum but require correct drill size for proper thread form.' }
      },
    ],
  },
};

'use strict';

const OAP_EMPLOYER = {

  // ── STORAGE KEYS ────────────────────────────────────────────────
  _keys: {
    profile:   'oap-employer-profile',
    programs:  'oap-employer-programs',
    mentors:   'oap-employer-mentors',
    mentees:   'oap-employer-mentees',
    certs:     'oap-certs',
  },

  // ── LOAD / SAVE ──────────────────────────────────────────────────
  getProfile()           { return this._load(this._keys.profile)   || null; },
  getPrograms()          { return this._load(this._keys.programs)  || {}; },
  getMentors()           { return this._load(this._keys.mentors)   || {}; },
  getMentees()           { return this._load(this._keys.mentees)   || {}; },
  getCerts()             { return this._load(this._keys.certs)     || {}; },
  saveProfile(p)         { this._save(this._keys.profile,  p); },
  savePrograms(p)        { this._save(this._keys.programs, p); },
  saveMentors(m)         { this._save(this._keys.mentors,  m); },
  saveMentees(m)         { this._save(this._keys.mentees,  m); },
  saveCerts(c)           { this._save(this._keys.certs,    c); },

  // ── EMPLOYER PROFILE ────────────────────────────────────────────
  // @returns {Object} employer business profile
  createProfile(data) {
    var p = {
      id:           'emp-' + Date.now(),
      companyName:  data.companyName   || '',
      industry:     data.industry      || '',
      address:      data.address       || '',
      city:         data.city          || '',
      state:        data.state         || '',
      zip:          data.zip           || '',
      phone:        data.phone         || '',
      email:        data.email         || '',
      website:      data.website       || '',
      contactName:  data.contactName   || '',
      contactTitle: data.contactTitle  || '',
      // OAP program settings
      oapEnabled:   true,
      certValidYears: data.certValidYears || 2,
      recertWeeks:  data.recertWeeks   || 104, // 2 years
      requireEmployerBuyOff: data.requireEmployerBuyOff !== false,
      allowPortableCert: data.allowPortableCert !== false,
      logoData:     data.logoData      || null, // base64 for cert
      createdAt:    new Date().toISOString(),
      updatedAt:    new Date().toISOString(),
    };
    this.saveProfile(p);
    return p;
  },

  updateProfile(data) {
    var p = Object.assign(this.getProfile() || {}, data, { updatedAt: new Date().toISOString() });
    this.saveProfile(p);
    return p;
  },

  // ── OAP PROGRAM CREATION ─────────────────────────────────────────
  // An employer creates a "program" for each role they hire for.
  // @param {string} roleId   — OAP_ROLES key
  // @param {Object} config   — sections, checkpoints, schedule, required equipment
  createProgram(roleId, config) {
    var programs = this.getPrograms();
    var progId = 'prog-' + roleId + '-' + Date.now();
    programs[progId] = {
      id:          progId,
      roleId:      roleId,
      roleLabel:   OAP_ROLES[roleId] ? OAP_ROLES[roleId].label : config.roleLabel || roleId,
      // Which sections are active for this role
      sections:    config.sections    || ['orientation','safety','materials','measuring','tooling','machine','floor'],
      // Employer-selected checkpoints per section
      checkpoints: config.checkpoints || this._defaultCheckpoints(roleId),
      // Which machines this role will be qualified on
      machines:    config.machines    || [],
      // Which measuring tools required
      measuring:   config.measuring   || [],
      // Which tooling to be familiar with
      tooling:     config.tooling     || [],
      // Which safety certs required
      safetyCerts: config.safetyCerts || ['shop_safety','ppe_cert','lockout_tagout','fire_ext','hazcom'],
      // Which OAK template to use
      oakTemplate: config.oakTemplate || null,
      // Custom OAK checkpoints (employer-added)
      oakCustom:   config.oakCustom   || [],
      // Schedule template
      scheduleTemplate: config.scheduleTemplate || 'standard_90',
      customSchedule:   config.customSchedule   || null,
      passMark:    config.passMark    || 80,
      active:      true,
      createdAt:   new Date().toISOString(),
      updatedAt:   new Date().toISOString(),
    };
    this.savePrograms(programs);
    return programs[progId];
  },

  updateProgram(progId, data) {
    var programs = this.getPrograms();
    if (!programs[progId]) return null;
    programs[progId] = Object.assign(programs[progId], data, { updatedAt: new Date().toISOString() });
    this.savePrograms(programs);
    return programs[progId];
  },

  _defaultCheckpoints(roleId) {
    var role = OAP_ROLES[roleId];
    var track = role ? role.track : 'lathe';
    var base = {};
    // Always include all orientation + safety checkpoints
    base.orientation = (OAP_CHECKPOINT_LIBRARY.orientation || []).map(function(c){ return c.id; });
    base.safety      = (OAP_CHECKPOINT_LIBRARY.safety      || []).map(function(c){ return c.id; });
    base.materials   = (OAP_CHECKPOINT_LIBRARY.materials   || []).map(function(c){ return c.id; });
    base.measuring   = (OAP_CHECKPOINT_LIBRARY.measuring   || []).map(function(c){ return c.id; });
    base.tooling     = (OAP_CHECKPOINT_LIBRARY.tooling     || []).map(function(c){ return c.id; });
    return base;
  },

  // ── MENTOR MANAGEMENT ────────────────────────────────────────────
  addMentor(data) {
    var mentors = this.getMentors();
    var mentorId = 'mentor-' + Date.now();
    mentors[mentorId] = {
      id:        mentorId,
      name:      data.name      || '',
      title:     data.title     || '',
      email:     data.email     || '',
      phone:     data.phone     || '',
      roles:     data.roles     || [],   // which OAP_ROLES they can mentor
      machines:  data.machines  || [],   // which machines they are certified to sign off
      // Mentor credentials
      certifiedBy: data.certifiedBy || '',
      certDate:    data.certDate    || '',
      active:    true,
      createdAt: new Date().toISOString(),
    };
    this.saveMentors(mentors);
    return mentors[mentorId];
  },

  // ── MENTEE ENROLLMENT ────────────────────────────────────────────
  enrollMentee(data) {
    var mentees = this.getMentees();
    var menteeId = 'mentee-' + Date.now();
    var prog = data.programId ? this.getPrograms()[data.programId] : null;
    mentees[menteeId] = {
      id:         menteeId,
      name:       data.name       || '',
      email:      data.email      || '',
      phone:      data.phone      || '',
      hireDate:   data.hireDate   || new Date().toISOString().slice(0,10),
      roleId:     data.roleId     || '',
      programId:  data.programId  || '',
      mentorId:   data.mentorId   || '',
      employerId: (this.getProfile() || {}).id || '',
      // Progress tracking
      status:     OAP_STATUS.IN_PROGRESS,
      currentSection: 'orientation',
      // Checkpoint completion: { checkpointId: { status, signedBy, signedAt, menteeNotes, mentorNotes } }
      checkpoints: {},
      // Section completion dates
      sectionDates: {},
      // Test scores
      courseScores: {},
      // Equipment sign-offs: { equipId: { signedBy, signedAt, notes } }
      equipSignOffs: {},
      // Machine buy-offs: { machineId: { mentorSignOff, employerBuyOff, date, notes } }
      machineBuyOffs: {},
      // Mentee notes (free form per section)
      menteeNotes: {},
      // Final cert
      certId: null,
      enrolledAt: new Date().toISOString(),
      updatedAt:  new Date().toISOString(),
    };
    this.saveMentees(mentees);
    return mentees[menteeId];
  },

  getMentee(menteeId) {
    return (this.getMentees())[menteeId] || null;
  },

  updateMentee(menteeId, data) {
    var mentees = this.getMentees();
    if (!mentees[menteeId]) return null;
    mentees[menteeId] = Object.assign(mentees[menteeId], data, { updatedAt: new Date().toISOString() });
    this.saveMentees(mentees);
    return mentees[menteeId];
  },

  // Sign off a checkpoint (mentor action)
  signCheckpoint(menteeId, checkpointId, signedBy, passed, notes) {
    var mentee = this.getMentee(menteeId);
    if (!mentee) return false;
    mentee.checkpoints[checkpointId] = {
      status:    passed ? OAP_STATUS.COMPLETE : OAP_STATUS.FAILED,
      signedBy:  signedBy,
      signedAt:  new Date().toISOString(),
      passed:    passed,
      notes:     notes || '',
    };
    mentee.updatedAt = new Date().toISOString();
    var mentees = this.getMentees();
    mentees[menteeId] = mentee;
    this.saveMentees(mentees);
    return mentee;
  },

  // Buy-off a machine (employer final action)
  buyOffMachine(menteeId, machineId, employerName, notes) {
    var mentee = this.getMentee(menteeId);
    if (!mentee) return false;
    mentee.machineBuyOffs[machineId] = {
      mentorSignOff:   true,
      employerBuyOff:  true,
      employerName:    employerName,
      date:            new Date().toISOString(),
      notes:           notes || '',
    };
    mentee.updatedAt = new Date().toISOString();
    var mentees = this.getMentees();
    mentees[menteeId] = mentee;
    this.saveMentees(mentees);
    return mentee;
  },

  // Add mentee equipment sign-off
  signEquipment(menteeId, equipId, signedBy, notes) {
    var mentee = this.getMentee(menteeId);
    if (!mentee) return false;
    mentee.equipSignOffs[equipId] = { signedBy, signedAt: new Date().toISOString(), notes: notes||'' };
    var mentees = this.getMentees();
    mentees[menteeId] = mentee;
    this.saveMentees(mentees);
    return mentee;
  },

  // Record a course score
  recordCourseScore(menteeId, courseId, score, passed) {
    var mentee = this.getMentee(menteeId);
    if (!mentee) return false;
    var existing = mentee.courseScores[courseId] || {};
    mentee.courseScores[courseId] = {
      score, passed,
      attempts:  (existing.attempts || 0) + 1,
      bestScore: Math.max(existing.bestScore || 0, score),
      lastAt:    new Date().toISOString(),
      passedAt:  (passed && !existing.passedAt) ? new Date().toISOString() : existing.passedAt,
    };
    var mentees = this.getMentees();
    mentees[menteeId] = mentee;
    this.saveMentees(mentees);
    return mentee;
  },

  // Compute section completion % for a mentee
  getSectionProgress(menteeId) {
    var mentee = this.getMentee(menteeId);
    if (!mentee) return {};
    var prog = this.getPrograms()[mentee.programId];
    if (!prog) return {};
    var result = {};
    OAP_SECTIONS.forEach(function(sec) {
      var cpIds = prog.checkpoints[sec.id] || [];
      if (!cpIds.length) { result[sec.id] = { pct:0, done:0, total:0, unlocked:false }; return; }
      var done = cpIds.filter(function(id){ return mentee.checkpoints[id] && mentee.checkpoints[id].passed; }).length;
      // Section is unlocked if all required-before sections are 100%
      var unlocked = (sec.requiredBefore || []).every(function(req){
        return result[req] && result[req].pct === 100;
      }) || sec.requiredBefore.length === 0;
      result[sec.id] = { pct: Math.round(done/cpIds.length*100), done, total: cpIds.length, unlocked };
    });
    return result;
  },

  // ── CERTIFICATE ISSUANCE ─────────────────────────────────────────
  issueCertificate(menteeId, employerSignature) {
    var mentee = this.getMentee(menteeId);
    var profile = this.getProfile();
    var programs = this.getPrograms();
    var mentors  = this.getMentors();
    if (!mentee || !profile) return null;

    var prog   = programs[mentee.programId] || {};
    var mentor = mentors[mentee.mentorId]   || {};

    var certId = 'CERT-' + Math.random().toString(36).slice(2,8).toUpperCase() + '-' + new Date().getFullYear();
    var issued = new Date().toISOString();
    var expires = new Date(Date.now() + (profile.certValidYears||2) * 365.25*24*3600*1000).toISOString();

    // Collect what was passed
    var machinesPassed  = Object.keys(mentee.machineBuyOffs).filter(function(k){ return mentee.machineBuyOffs[k].employerBuyOff; });
    var equipPassed     = Object.keys(mentee.equipSignOffs);
    var safetyCertsDone = (prog.safetyCerts||[]).filter(function(sc){ return mentee.courseScores['safety_'+sc] && mentee.courseScores['safety_'+sc].passed; });

    var cert = {
      certId,
      certType:    'initial',
      menteeId,
      menteeName:  mentee.name,
      menteeEmail: mentee.email,
      employerId:  profile.id,
      employerName: profile.companyName,
      employerCity: profile.city + ', ' + profile.state,
      roleId:      mentee.roleId,
      roleLabel:   prog.roleLabel || (OAP_ROLES[mentee.roleId]||{}).label || '',
      machinesPassed,
      toolingPassed:   equipPassed.filter(function(id){ return OAP_TOOLING[id]; }),
      measuringPassed: equipPassed.filter(function(id){ return OAP_MEASURING[id]; }),
      safetyCerts:     safetyCertsDone,
      mentorName:      mentor.name || '',
      mentorTitle:     mentor.title || '',
      employerSignature: employerSignature || profile.contactName,
      issuedDate:   issued,
      expiresDate:  expires,
      checkpoints:  mentee.checkpoints,
      // Portable verification string
      qrPayload:    JSON.stringify({ certId, menteeName: mentee.name, employerName: profile.companyName, roleLabel: prog.roleLabel, issuedDate: issued, machinesPassed }),
      issuedAt:     issued,
    };

    var certs = this.getCerts();
    certs[certId] = cert;
    this.saveCerts(certs);

    // Update mentee record
    this.updateMentee(menteeId, { certId, status: OAP_STATUS.COMPLETE });

    return cert;
  },

  // ── RECERTIFICATION ──────────────────────────────────────────────
  issueRecert(originalCertId, employerSignature) {
    var certs  = this.getCerts();
    var orig   = certs[originalCertId];
    if (!orig) return null;
    var recert = Object.assign({}, orig, {
      certId:   'RECERT-' + Math.random().toString(36).slice(2,8).toUpperCase() + '-' + new Date().getFullYear(),
      certType: 'recert',
      originalCertId: originalCertId,
      issuedDate:  new Date().toISOString(),
      expiresDate: new Date(Date.now() + 2*365.25*24*3600*1000).toISOString(),
      employerSignature: employerSignature,
      issuedAt: new Date().toISOString(),
    });
    certs[recert.certId] = recert;
    this.saveCerts(certs);
    return recert;
  },

  // ── PERSISTENCE ──────────────────────────────────────────────────
  _load(key) { try { var r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch(e){ return null; } },
  _save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} },

  // Export mentee portable record (for resume/job change)
  exportPortableRecord(menteeId) {
    var mentee = this.getMentee(menteeId);
    var certs  = this.getCerts();
    if (!mentee) return null;
    var cert = mentee.certId ? certs[mentee.certId] : null;
    return {
      exportedAt:  new Date().toISOString(),
      version:     '1.0',
      mentee:      { name: mentee.name, email: mentee.email },
      certificates: cert ? [cert] : [],
      machinesPassed: cert ? cert.machinesPassed : [],
      measuringPassed: cert ? cert.measuringPassed : [],
      toolingPassed:  cert ? cert.toolingPassed   : [],
      safetyCerts:    cert ? cert.safetyCerts      : [],
      courseScores:   mentee.courseScores,
    };
  },
};

// JobLine.ai | JobLine.ai | v1.0.0
// ═══════════════════════════════════════════════════════════════════

'use strict';

const OAP_CERT = {

  // Generate printable HTML certificate string
  generate(cert) {
    var issued  = new Date(cert.issuedDate).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    var expires = new Date(cert.expiresDate).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    var isRecert = cert.certType === 'recert';

    // Build equipment lists
    var machineList = (cert.machinesPassed||[]).map(function(id){
      var m = OAP_MACHINES[id]; return m ? m.label : id;
    });
    var measList = (cert.measuringPassed||[]).map(function(id){
      var m = OAP_MEASURING[id]; return m ? m.label : id;
    });
    var toolList = (cert.toolingPassed||[]).map(function(id){
      var m = OAP_TOOLING[id]; return m ? m.label : id;
    });
    var safetyList = (cert.safetyCerts||[]).map(function(id){
      var m = OAP_SAFETY[id]; return m ? m.label : id;
    });

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAP Certificate — ${cert.menteeName}</title>
<style>

  .cert-header { text-align:center; border-bottom:2px solid #1a1a2e; padding-bottom:22px; margin-bottom:22px; }
  .cert-program { font-family:'Inter',sans-serif; font-weight:900; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:#c8a96e; margin-bottom:6px; }
  .cert-title { font-family:'Inter',sans-serif; font-weight:900; font-size:38px; line-height:1; color:#1a1a2e; margin-bottom:4px; }
  .cert-sub { font-family:'Inter',sans-serif; font-size:16px; font-weight:400; color:#555; letter-spacing:2px; }
  ${isRecert ? '.cert-recert-badge { display:inline-block; background:#c8a96e; color:#fff; font-family:"Barlow Condensed",sans-serif; font-weight:700; font-size:10px; letter-spacing:2px; padding:3px 10px; border-radius:3px; margin-top:6px; }' : ''}
  /* Body */

  .cert-presented { font-size:12px; color:#888; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .cert-name { font-family:'Inter',sans-serif; font-weight:900; font-size:42px; color:#1a1a2e; margin-bottom:4px; border-bottom:2px solid #c8a96e; display:inline-block; padding:0 20px; }
  .cert-role-line { font-size:13px; color:#444; margin-top:8px; line-height:1.6; }
  .cert-role { font-weight:600; color:#1a1a2e; }
  /* Equipment grid */
  .cert-section { margin-bottom:18px; }
  .cert-sec-title { font-family:'Inter',sans-serif; font-weight:700; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:#c8a96e; border-bottom:1px solid #e0e0d8; margin-bottom:8px; padding-bottom:4px; }
  .cert-pills { display:flex; flex-wrap:wrap; gap:5px; }

  /* Signoff row */
