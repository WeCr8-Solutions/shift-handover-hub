<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="520" fill="#f8f9fa" rx="8"/>
  <rect x="1" y="1" width="798" height="518" fill="none" stroke="#dee2e6" stroke-width="1.5" rx="8"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Contour Milling with End Mill</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#6c757d">Climb milling | G41 cutter compensation active | Programmed path vs tool center path</text>

  <!-- ── WORKPIECE ── -->
  <!-- Main block -->
  <rect x="80" y="130" width="540" height="260" fill="#e8edf2" stroke="#adb5bd" stroke-width="2" rx="3"/>
  <!-- Contoured pocket / profile cut into block -->
  <path d="M 180 130 L 180 230 Q 200 270 260 270 Q 320 270 340 230 Q 360 190 420 190 Q 480 190 500 230 L 500 130 Z" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1.5"/>
  <!-- Hatching for workpiece material -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#b0bec5" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect x="80" y="130" width="540" height="260" fill="url(#hatch)" opacity="0.4" rx="3"/>

  <!-- ── FINISHED CONTOUR SURFACE ── -->
  <path d="M 180 230 Q 200 270 260 270 Q 320 270 340 230 Q 360 190 420 190 Q 480 190 500 230"
        fill="none" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">Finished contour surface</text>
  <line x1="340" y1="293" x2="340" y2="280" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── PROGRAMMED PATH (center of cutter) ── -->
  <!-- The tool center path is offset inward by cutter radius from the contour -->
  <path d="M 196 230 Q 214 258 260 258 Q 313 258 332 224 Q 350 190 420 178 Q 468 178 484 216"
        fill="none" stroke="#e65100" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="590" y="178" text-anchor="start" font-size="11" fill="#e65100" font-weight="600">Tool center path</text>
  <text x="590" y="191" text-anchor="start" font-size="10" fill="#e65100">(G41 offset applied)</text>
  <line x1="484" y1="215" x2="574" y2="185" stroke="#e65100" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── END MILL ── -->
  <!-- Tool at roughly middle of path -->
  <g transform="translate(350,168)">
    <!-- Shank -->
    <rect x="-8" y="-90" width="16" height="60" fill="#78909c" stroke="#546e7a" stroke-width="1.2" rx="2"/>
    <!-- Flute body -->
    <rect x="-8" y="-32" width="16" height="32" fill="#90a4ae" stroke="#546e7a" stroke-width="1.2"/>
    <!-- Flutes (stylized) -->
    <line x1="-8" y1="-28" x2="-8" y2="0" stroke="#546e7a" stroke-width="1"/>
    <line x1="-4" y1="-30" x2="-4" y2="0" stroke="#546e7a" stroke-width="1"/>
    <line x1="0" y1="-30" x2="0" y2="0" stroke="#546e7a" stroke-width="1"/>
    <line x1="4" y1="-30" x2="4" y2="0" stroke="#546e7a" stroke-width="1"/>
    <line x1="8" y1="-28" x2="8" y2="0" stroke="#546e7a" stroke-width="1"/>
    <!-- End face / cutting edge -->
    <rect x="-8" y="-2" width="16" height="4" fill="#ffc107" stroke="#ff8f00" stroke-width="1.2" rx="1"/>
    <!-- Cutter radius indicator -->
    <line x1="0" y1="0" x2="8" y2="0" stroke="#e65100" stroke-width="1.5" stroke-dasharray="2,2"/>
    <circle cx="8" cy="0" r="2" fill="#e65100"/>
    <!-- Rotation arrow -->
    <path d="M -14 -60 A 14 14 0 0 1 14 -60" fill="none" stroke="#ff7043" stroke-width="2" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ── CLIMB vs CONVENTIONAL CALLOUT ── -->
  <!-- Feed direction arrow -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff7043"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/>
    </marker>
  </defs>
  <!-- Feed direction along path -->
  <path d="M 250 168 L 330 165" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="248" y="158" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="600">Feed direction</text>

  <!-- ── CLIMB MILLING CALLOUT ── -->
  <rect x="82" y="340" width="200" height="58" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="5"/>
  <text x="182" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">✓ Climb Milling</text>
  <text x="182" y="373" text-anchor="middle" font-size="10" fill="#333">Cutter rotation matches feed</text>
  <text x="182" y="386" text-anchor="middle" font-size="10" fill="#333">Chip: thick → thin | Better finish</text>

  <!-- ── CHIP FORMATION ARROW ── -->
  <text x="182" y="416" text-anchor="middle" font-size="10" fill="#555">Chip thickness at entry:</text>
  <!-- Chip shape illustration -->
  <path d="M 140 430 Q 145 425 165 428 Q 175 432 180 440 L 140 430 Z" fill="#ff8f00" opacity="0.8"/>
  <text x="225" y="438" text-anchor="start" font-size="10" fill="#555">Thick → thin (climb)</text>

  <!-- ── CUTTER COMP CALLOUT ── -->
  <rect x="520" y="340" width="200" height="72" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" rx="5"/>
  <text x="620" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">G41 Cutter Comp</text>
  <text x="620" y="373" text-anchor="middle" font-size="10" fill="#333">Tool center offset = cutter radius</text>
  <text x="620" y="386" text-anchor="middle" font-size="10" fill="#333">to the left of programmed path</text>
  <text x="620" y="399" text-anchor="middle" font-size="10" fill="#555">Adjust D register to tune wall</text>

  <!-- ── SURFACE DETAIL ── -->
  <!-- Cusp marks on contour to show pass -->
  <line x1="200" y1="264" x2="200" y2="272" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="230" y1="269" x2="230" y2="277" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="260" y1="270" x2="260" y2="278" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="290" y1="268" x2="290" y2="276" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="320" y1="260" x2="320" y2="268" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="350" y1="246" x2="350" y2="254" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="380" y1="222" x2="380" y2="230" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="410" y1="204" x2="410" y2="212" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="440" y1="196" x2="440" y2="204" stroke="#0d47a1" stroke-width="1.5"/>
  <line x1="470" y1="202" x2="470" y2="210" stroke="#0d47a1" stroke-width="1.5"/>

  <!-- ── DIMENSION CALLOUTS ── -->
  <!-- RDOC arrow -->
  <line x1="390" y1="190" x2="390" y2="270" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="380" y1="270" x2="400" y2="270" stroke="#9c27b0" stroke-width="1"/>
  <line x1="380" y1="190" x2="400" y2="190" stroke="#9c27b0" stroke-width="1"/>
  <text x="410" y="232" text-anchor="start" font-size="10" fill="#9c27b0">ADOC</text>
  <text x="410" y="244" text-anchor="start" font-size="9" fill="#9c27b0">(Z depth)</text>

  <!-- Legend -->
  <rect x="82" y="462" width="636" height="44" fill="white" stroke="#dee2e6" stroke-width="1" rx="4" opacity="0.9"/>
  <line x1="96" y1="484" x2="130" y2="484" stroke="#1565c0" stroke-width="3"/>
  <text x="136" y="488" font-size="11" fill="#333">Finished contour</text>
  <line x1="240" y1="484" x2="274" y2="484" stroke="#e65100" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="280" y="488" font-size="11" fill="#333">Tool center path</text>
  <rect x="394" y="478" width="12" height="12" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <text x="412" y="488" font-size="11" fill="#333">Material removed (this pass)</text>
  <circle cx="566" cy="484" r="6" fill="#ffc107" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="578" y="488" font-size="11" fill="#333">Cutting edge contact</text>
</svg>
