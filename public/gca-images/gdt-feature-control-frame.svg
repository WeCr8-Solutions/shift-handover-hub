<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#f8f9fa" rx="8"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#dee2e6" stroke-width="1.5" rx="8"/>

  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">GD&amp;T Feature Control Frame</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#6c757d">Reading a FCF left to right — symbol, tolerance, modifiers, datums</text>

  <!-- ═══════════════════════════════════ -->
  <!-- FEATURE CONTROL FRAME              -->
  <!-- ═══════════════════════════════════ -->
  <!-- Outer frame -->
  <rect x="60" y="70" width="680" height="70" fill="white" stroke="#37474f" stroke-width="3" rx="2"/>
  <!-- Dividers -->
  <line x1="140" y1="70" x2="140" y2="140" stroke="#37474f" stroke-width="2"/>
  <line x1="340" y1="70" x2="340" y2="140" stroke="#37474f" stroke-width="2"/>
  <line x1="430" y1="70" x2="430" y2="140" stroke="#37474f" stroke-width="2"/>
  <line x1="520" y1="70" x2="520" y2="140" stroke="#37474f" stroke-width="2"/>
  <line x1="610" y1="70" x2="610" y2="140" stroke="#37474f" stroke-width="2"/>

  <!-- GD&T Symbol: True Position -->
  <circle cx="100" cy="105" r="22" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
  <line x1="100" y1="83" x2="100" y2="127" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="78" y1="105" x2="122" y2="105" stroke="#1a1a2e" stroke-width="2"/>
  <text x="100" y="155" text-anchor="middle" font-size="10" fill="#555">Geometric</text>
  <text x="100" y="166" text-anchor="middle" font-size="10" fill="#555">characteristic</text>
  <text x="100" y="177" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="600">⊕ True Position</text>

  <!-- Diameter symbol + tolerance -->
  <text x="190" y="112" text-anchor="middle" font-size="26" fill="#1a1a2e">⌀</text>
  <text x="240" y="115" text-anchor="start" font-size="20" fill="#1a1a2e" font-weight="700">0.010</text>
  <text x="240" y="155" text-anchor="middle" font-size="10" fill="#555">Tolerance</text>
  <text x="240" y="166" text-anchor="middle" font-size="10" fill="#555">zone shape</text>
  <text x="240" y="177" text-anchor="middle" font-size="10" fill="#1565c0">⌀ = cylindrical</text>

  <!-- MMC modifier -->
  <circle cx="466" cy="105" r="18" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="466" y="111" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="700">M</text>
  <text x="476" y="155" text-anchor="middle" font-size="10" fill="#555">Material</text>
  <text x="476" y="166" text-anchor="middle" font-size="10" fill="#555">condition</text>
  <text x="476" y="177" text-anchor="middle" font-size="10" fill="#c62828" font-weight="600">Ⓜ = MMC (bonus)</text>

  <!-- Datum A -->
  <text x="565" y="115" text-anchor="middle" font-size="22" fill="#1a1a2e" font-weight="700">A</text>
  <text x="565" y="155" text-anchor="middle" font-size="10" fill="#555">Primary</text>
  <text x="565" y="166" text-anchor="middle" font-size="10" fill="#555">datum</text>
  <text x="565" y="177" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="600">Establishes plane</text>

  <!-- Datum B -->
  <text x="655" y="115" text-anchor="middle" font-size="22" fill="#1a1a2e" font-weight="700">B</text>
  <text x="655" y="155" text-anchor="middle" font-size="10" fill="#555">Secondary</text>
  <text x="655" y="166" text-anchor="middle" font-size="10" fill="#555">datum</text>
  <text x="655" y="177" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="600">Constrains axis</text>

  <!-- Note: no tertiary datum in this example -->
  <text x="740" y="115" text-anchor="middle" font-size="14" fill="#bbb">—</text>
  <text x="740" y="155" text-anchor="middle" font-size="10" fill="#bbb">Tertiary</text>
  <text x="740" y="166" text-anchor="middle" font-size="10" fill="#bbb">datum</text>
  <text x="740" y="177" text-anchor="middle" font-size="10" fill="#bbb">optional</text>

  <!-- ═══════════════════════════════════ -->
  <!-- PART WITH HOLE AND TOLERANCE ZONE  -->
  <!-- ═══════════════════════════════════ -->
  <rect x="60" y="200" width="200" height="260" fill="#e8edf2" stroke="#90a4ae" stroke-width="2" rx="4"/>
  <!-- Datum A face -->
  <line x1="60" y1="200" x2="260" y2="200" stroke="#2e7d32" stroke-width="3"/>
  <text x="160" y="216" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="600">Datum A (primary plane)</text>
  <!-- Datum B edge -->
  <line x1="260" y1="200" x2="260" y2="460" stroke="#1565c0" stroke-width="3"/>
  <text x="268" y="335" font-size="10" fill="#1565c0" font-weight="600" transform="rotate(90,268,335)">Datum B</text>

  <!-- True position cross -->
  <line x1="160" y1="310" x2="160" y2="280" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="140" y1="300" x2="180" y2="300" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="186" y="295" font-size="9" fill="#ff8f00">True position</text>
  <text x="186" y="306" font-size="9" fill="#ff8f00">center</text>

  <!-- Tolerance zone (cylindrical tube) -->
  <circle cx="160" cy="300" r="22" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="160" y="342" text-anchor="middle" font-size="9" fill="#c62828">⌀ 0.010" tol zone</text>

  <!-- Actual hole (slightly off true position) -->
  <circle cx="163" cy="296" r="16" fill="#b3e5fc" stroke="#0277bd" stroke-width="2"/>
  <circle cx="163" cy="296" r="2" fill="#0277bd"/>
  <text x="170" y="372" text-anchor="middle" font-size="9" fill="#0277bd">Actual hole center</text>
  <text x="170" y="383" text-anchor="middle" font-size="9" fill="#0277bd">deviation = 0.006\"</text>

  <!-- Deviation arrow -->
  <line x1="160" y1="300" x2="163" y2="296" stroke="#9c27b0" stroke-width="2"/>
  <circle cx="160" cy="300" r="3" fill="#9c27b0"/>
  <text x="175" y="293" font-size="9" fill="#9c27b0">dev</text>

  <!-- Bonus tolerance explanation -->
  <rect x="60" y="420" width="200" height="40" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5" rx="3"/>
  <text x="160" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">Hole: 0.502\" actual vs 0.500\" MMC</text>
  <text x="160" y="450" text-anchor="middle" font-size="10" fill="#555">Bonus = 0.002\" → Total tol = 0.012\"</text>

  <!-- ═══════════════════════════════════ -->
  <!-- RIGHT: COMMON GD&T SYMBOLS TABLE   -->
  <!-- ═══════════════════════════════════ -->
  <text x="500" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#37474f">Common GD&amp;T Symbols</text>

  <!-- Table grid -->
  <rect x="290" y="220" width="470" height="240" fill="white" stroke="#dee2e6" stroke-width="1" rx="3"/>
  <line x1="290" y1="240" x2="760" y2="240" stroke="#dee2e6" stroke-width="1"/>
  <!-- Column headers -->
  <text x="320" y="234" text-anchor="middle" font-size="10" fill="#666" font-weight="600">Symbol</text>
  <line x1="370" y1="220" x2="370" y2="460" stroke="#dee2e6" stroke-width="1"/>
  <text x="460" y="234" text-anchor="middle" font-size="10" fill="#666" font-weight="600">Name</text>
  <line x1="570" y1="220" x2="570" y2="460" stroke="#dee2e6" stroke-width="1"/>
  <text x="665" y="234" text-anchor="middle" font-size="10" fill="#666" font-weight="600">Category</text>

  <!-- Rows -->
  <!-- Flatness -->
  <line x1="290" y1="258" x2="760" y2="258" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="254" text-anchor="middle" font-size="14" fill="#333">⏥</text>
  <text x="470" y="254" text-anchor="middle" font-size="11" fill="#333">Flatness</text>
  <text x="665" y="254" text-anchor="middle" font-size="10" fill="#555">Form (no datums)</text>
  <!-- Circularity -->
  <line x1="290" y1="276" x2="760" y2="276" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="272" text-anchor="middle" font-size="14" fill="#333">○</text>
  <text x="470" y="272" text-anchor="middle" font-size="11" fill="#333">Circularity (Roundness)</text>
  <text x="665" y="272" text-anchor="middle" font-size="10" fill="#555">Form (no datums)</text>
  <!-- Cylindricity -->
  <line x1="290" y1="294" x2="760" y2="294" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="290" text-anchor="middle" font-size="12" fill="#333">⌭</text>
  <text x="470" y="290" text-anchor="middle" font-size="11" fill="#333">Cylindricity</text>
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#555">Form (no datums)</text>
  <!-- Perpendicularity -->
  <line x1="290" y1="312" x2="760" y2="312" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="308" text-anchor="middle" font-size="14" fill="#333">⊥</text>
  <text x="470" y="308" text-anchor="middle" font-size="11" fill="#333">Perpendicularity</text>
  <text x="665" y="308" text-anchor="middle" font-size="10" fill="#555">Orientation (requires datum)</text>
  <!-- Parallelism -->
  <line x1="290" y1="330" x2="760" y2="330" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="326" text-anchor="middle" font-size="14" fill="#333">∥</text>
  <text x="470" y="326" text-anchor="middle" font-size="11" fill="#333">Parallelism</text>
  <text x="665" y="326" text-anchor="middle" font-size="10" fill="#555">Orientation (requires datum)</text>
  <!-- True Position -->
  <line x1="290" y1="348" x2="760" y2="348" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="344" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="700">⊕</text>
  <text x="470" y="344" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">True Position</text>
  <text x="665" y="344" text-anchor="middle" font-size="10" fill="#1565c0">Location (requires datum)</text>
  <!-- Concentricity -->
  <line x1="290" y1="366" x2="760" y2="366" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="362" text-anchor="middle" font-size="12" fill="#333">◎</text>
  <text x="470" y="362" text-anchor="middle" font-size="11" fill="#333">Concentricity (deprecated Y14.5-2018)</text>
  <text x="665" y="362" text-anchor="middle" font-size="10" fill="#c62828">Use Position instead</text>
  <!-- Profile of surface -->
  <line x1="290" y1="384" x2="760" y2="384" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="380" text-anchor="middle" font-size="12" fill="#333">⌓</text>
  <text x="470" y="380" text-anchor="middle" font-size="11" fill="#333">Profile of a Surface</text>
  <text x="665" y="380" text-anchor="middle" font-size="10" fill="#555">Form / Location</text>
  <!-- Runout -->
  <line x1="290" y1="402" x2="760" y2="402" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="398" text-anchor="middle" font-size="12" fill="#333">↗</text>
  <text x="470" y="398" text-anchor="middle" font-size="11" fill="#333">Circular Runout</text>
  <text x="665" y="398" text-anchor="middle" font-size="10" fill="#555">Runout (requires datum axis)</text>
  <!-- Total Runout -->
  <line x1="290" y1="420" x2="760" y2="420" stroke="#f5f5f5" stroke-width="1"/>
  <text x="330" y="416" text-anchor="middle" font-size="12" fill="#333">⇗</text>
  <text x="470" y="416" text-anchor="middle" font-size="11" fill="#333">Total Runout</text>
  <text x="665" y="416" text-anchor="middle" font-size="10" fill="#555">Runout (entire surface)</text>
  <!-- Angularity -->
  <text x="330" y="452" text-anchor="middle" font-size="14" fill="#333">∠</text>
  <text x="470" y="452" text-anchor="middle" font-size="11" fill="#333">Angularity</text>
  <text x="665" y="452" text-anchor="middle" font-size="10" fill="#555">Orientation (requires datum)</text>

  <!-- MMC / LMC reminder -->
  <rect x="290" y="470" width="470" height="26" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" rx="3"/>
  <text x="525" y="487" text-anchor="middle" font-size="10" fill="#1b5e20">Ⓜ MMC = max material (largest shaft / smallest hole) | Ⓛ LMC = least material | S RFS = applies regardless of size</text>
</svg>
