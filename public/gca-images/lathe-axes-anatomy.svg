<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <rect width="800" height="500" fill="#0f172a"/>
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">CNC Lathe: Axes, Anatomy &amp; Coordinate System</text>

  <!-- Machine bed outline -->
  <rect x="60" y="80" width="680" height="280" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Headstock -->
  <rect x="80" y="95" width="140" height="255" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="230" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">HEADSTOCK</text>
  <!-- Spindle / chuck face -->
  <circle cx="220" cy="225" r="44" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="220" cy="225" r="30" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="220" cy="225" r="10" fill="#3b82f6"/>
  <!-- Chuck jaws -->
  <rect x="208" y="182" width="8" height="20" rx="2" fill="#60a5fa"/>
  <rect x="208" y="250" width="8" height="20" rx="2" fill="#60a5fa"/>
  <rect x="175" y="212" width="20" height="8" rx="2" fill="#60a5fa"/>
  <rect x="242" y="212" width="20" height="8" rx="2" fill="#60a5fa"/>
  <text x="150" y="290" text-anchor="middle" fill="#60a5fa" font-size="11">3-jaw chuck</text>

  <!-- Workpiece (bar stock) -->
  <rect x="265" y="210" width="200" height="30" rx="4" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
  <text x="365" y="232" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="600">WORKPIECE</text>

  <!-- Turret / tool post -->
  <rect x="470" y="190" width="60" height="70" rx="4" fill="#1e3a2f" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="230" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">TURRET</text>
  <!-- Insert tip -->
  <polygon points="530,218 545,225 530,232" fill="#fbbf24"/>
  <text x="555" y="228" fill="#fbbf24" font-size="10">insert</text>

  <!-- Tailstock -->
  <rect x="600" y="130" width="100" height="200" rx="6" fill="#2d1b4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="650" y="235" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">TAILSTOCK</text>
  <!-- Live center -->
  <polygon points="600,218 580,225 600,232" fill="#a855f7"/>
  <text x="562" y="244" fill="#c4b5fd" font-size="10">live center</text>

  <!-- Z-axis arrow (left-right) -->
  <line x1="220" y1="395" x2="620" y2="395" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowZ)"/>
  <line x1="220" y1="395" x2="220" y2="395" stroke="#f59e0b" stroke-width="2.5" marker-start="url(#arrowZback)"/>
  <defs>
    <marker id="arrowZ" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowZback" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,3 L8,0 L8,6 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="420" y="415" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">Z-axis (spindle centerline, + toward tailstock)</text>

  <!-- X-axis arrow (up-down) -->
  <line x1="120" y1="350" x2="120" y2="110" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowX)"/>
  <defs>
    <marker id="arrowX" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="44" y="230" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700" transform="rotate(-90,44,230)">X-axis (radial, + away from center)</text>

  <!-- Spindle direction label -->
  <path d="M 170 150 A 30 30 0 0 1 200 130" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrowS)"/>
  <defs>
    <marker id="arrowS" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <text x="145" y="118" fill="#22d3ee" font-size="11">M03 CW</text>

  <!-- Key callouts box -->
  <rect x="60" y="385" width="340" height="95" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="403" fill="#94a3b8" font-size="11" font-weight="600">Key G-codes</text>
  <text x="80" y="420" fill="#f8fafc" font-size="11">G50 S____  — max spindle speed clamp</text>
  <text x="80" y="436" fill="#f8fafc" font-size="11">G96 S____ — constant surface speed (CSS)</text>
  <text x="80" y="452" fill="#f8fafc" font-size="11">G97 S____ — constant RPM</text>
  <text x="80" y="468" fill="#f8fafc" font-size="11">G54–G59  — work coordinate offset (WCS)</text>

  <!-- Diameter vs radius note -->
  <rect x="450" y="385" width="290" height="95" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="470" y="403" fill="#94a3b8" font-size="11" font-weight="600">Diameter Mode (default)</text>
  <text x="470" y="420" fill="#f8fafc" font-size="11">X values = diameter, not radius</text>
  <text x="470" y="436" fill="#f8fafc" font-size="11">X2.000 → tool at 1.000" from center</text>
  <text x="470" y="452" fill="#f8fafc" font-size="11">G7  — radius programming mode</text>
  <text x="470" y="468" fill="#f8fafc" font-size="11">G8  — diameter mode (G8 = default)</text>
</svg>
