<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <rect width="800" height="500" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">Haas CNC — Key Differences from Generic Fanuc</text>

  <!-- Section headers -->
  <rect x="40" y="48" width="720" height="26" rx="5" fill="#1e3a5f"/>
  <text x="400" y="65" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Haas extends Fanuc-compatible G-code with proprietary features. These are the most tested differences.</text>

  <!-- Column left: Macros & Variables -->
  <rect x="40" y="82" width="230" height="320" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="100" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">Macro Variables</text>
  <text x="55" y="118" fill="#94a3b8" font-size="11">Local: #1–#33 (cleared each call)</text>
  <text x="55" y="134" fill="#94a3b8" font-size="11">Global: #100–#199, #500–#699</text>
  <text x="55" y="150" fill="#94a3b8" font-size="11">System: #1000+ (read-only status)</text>
  <text x="55" y="170" fill="#f8fafc" font-family="monospace" font-size="11">#100 = 2.5</text>
  <text x="55" y="185" fill="#f8fafc" font-family="monospace" font-size="11">G01 X#100 F20.</text>
  <text x="55" y="200" fill="#f8fafc" font-family="monospace" font-size="11">IF [#100 GT 5.0] GOTO 10</text>
  <text x="55" y="215" fill="#f8fafc" font-family="monospace" font-size="11">WHILE [#1 LE 10] DO 1</text>
  <text x="55" y="230" fill="#f8fafc" font-family="monospace" font-size="11">  #1 = #1 + 1</text>
  <text x="55" y="245" fill="#f8fafc" font-family="monospace" font-size="11">END 1</text>
  <text x="55" y="265" fill="#64748b" font-size="10">Haas uses WHILE/DO/END.</text>
  <text x="55" y="278" fill="#64748b" font-size="10">Fanuc uses G66 / custom macro.</text>
  <text x="55" y="293" fill="#64748b" font-size="10">#3006 = message display</text>
  <text x="55" y="306" fill="#64748b" font-size="10">#3901/#3902 = M-code outputs</text>
  <text x="55" y="322" fill="#64748b" font-size="10">M97 = local sub-call</text>
  <text x="55" y="336" fill="#64748b" font-size="10">M98 P__ = external sub-call</text>
  <text x="55" y="350" fill="#64748b" font-size="10">M99 = return from sub</text>
  <text x="55" y="368" fill="#64748b" font-size="10">G65 P__ A__ B__ = macro call</text>
  <text x="55" y="381" fill="#64748b" font-size="10">(passing args to custom cycle)</text>

  <!-- Column center: Tool probing & offsets -->
  <rect x="285" y="82" width="230" height="320" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Tool Probing &amp; Offsets</text>
  <text x="300" y="118" fill="#94a3b8" font-size="11">Haas Probing G-codes</text>
  <text x="300" y="134" fill="#f8fafc" font-family="monospace" font-size="11">G31  — skip / probe move</text>
  <text x="300" y="149" fill="#f8fafc" font-family="monospace" font-size="11">G36  — auto tool length (ATC)</text>
  <text x="300" y="164" fill="#f8fafc" font-family="monospace" font-size="11">G37  — auto tool offset</text>
  <text x="300" y="183" fill="#94a3b8" font-size="11">Offset Registers</text>
  <text x="300" y="199" fill="#f8fafc" font-size="11">Length (H): geometry + wear split</text>
  <text x="300" y="214" fill="#f8fafc" font-size="11">Radius (D): cutter comp offset</text>
  <text x="300" y="229" fill="#64748b" font-size="10">Haas separates geometry/wear in</text>
  <text x="300" y="242" fill="#64748b" font-size="10">the offset page. Wear column is</text>
  <text x="300" y="255" fill="#64748b" font-size="10">added to geometry at run time.</text>
  <text x="300" y="273" fill="#94a3b8" font-size="11">Additional Work Offsets</text>
  <text x="300" y="289" fill="#f8fafc" font-family="monospace" font-size="11">G110–G129 (20 extra WCS)</text>
  <text x="300" y="304" fill="#64748b" font-size="10">Equivalent to Fanuc G54.1 P1–P20</text>
  <text x="300" y="323" fill="#94a3b8" font-size="11">Setting 23 — tool change position</text>
  <text x="300" y="339" fill="#64748b" font-size="10">Haas settings (0–600+) control</text>
  <text x="300" y="352" fill="#64748b" font-size="10">default behaviors: Setting 9 = exact</text>
  <text x="300" y="365" fill="#64748b" font-size="10">stop, Setting 57 = exact stop canned,</text>
  <text x="300" y="378" fill="#64748b" font-size="10">Setting 85 = max corner rounding.</text>
  <text x="300" y="391" fill="#64748b" font-size="10">Setting 1 = auto power off.</text>

  <!-- Column right: M-codes & operators panel -->
  <rect x="530" y="82" width="230" height="320" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="645" y="100" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">Haas M-codes &amp; Panel</text>
  <text x="545" y="118" fill="#94a3b8" font-size="11">Common Haas-specific M-codes</text>
  <text x="545" y="134" fill="#f8fafc" font-family="monospace" font-size="11">M109 — interactive message</text>
  <text x="545" y="149" fill="#f8fafc" font-family="monospace" font-size="11">M130 — display image file</text>
  <text x="545" y="164" fill="#f8fafc" font-family="monospace" font-size="11">M300 P__ — pause for input</text>
  <text x="545" y="179" fill="#f8fafc" font-family="monospace" font-size="11">M96 / M97 — sub calls</text>
  <text x="545" y="194" fill="#f8fafc" font-family="monospace" font-size="11">M08/M09 — coolant on/off</text>
  <text x="545" y="209" fill="#f8fafc" font-family="monospace" font-size="11">M88/M89 — high-pressure coolant</text>
  <text x="545" y="228" fill="#94a3b8" font-size="11">Haas NGC (Next Gen Control)</text>
  <text x="545" y="244" fill="#64748b" font-size="10">Touchscreen interface (2018+)</text>
  <text x="545" y="257" fill="#64748b" font-size="10">Dynamic Work Offsets (DWO)</text>
  <text x="545" y="270" fill="#64748b" font-size="10">G254 — DWO activate</text>
  <text x="545" y="283" fill="#64748b" font-size="10">G255 — DWO deactivate</text>
  <text x="545" y="300" fill="#94a3b8" font-size="11">Probing Cycles (Renishaw-based)</text>
  <text x="545" y="316" fill="#64748b" font-size="10">G143 — 5-axis TLO compensation</text>
  <text x="545" y="329" fill="#64748b" font-size="10">G234 — tool center point (TCP)</text>
  <text x="545" y="342" fill="#64748b" font-size="10">G68 / G69 — coordinate rotation</text>
  <text x="545" y="358" fill="#64748b" font-size="10">G51 / G50 — scaling</text>
  <text x="545" y="374" fill="#64748b" font-size="10">G52 — local coord shift</text>
  <text x="545" y="390" fill="#64748b" font-size="10">M11x — aux (rotary lock/unlock)</text>

  <!-- Footer comparison table -->
  <rect x="40" y="415" width="720" height="68" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="55" y="433" fill="#94a3b8" font-size="11" font-weight="700">Feature</text>
  <text x="230" y="433" fill="#94a3b8" font-size="11" font-weight="700">Fanuc</text>
  <text x="440" y="433" fill="#94a3b8" font-size="11" font-weight="700">Haas</text>
  <line x1="40" y1="437" x2="760" y2="437" stroke="#334155" stroke-width="1"/>
  <text x="55" y="451" fill="#f8fafc" font-size="10">Macro loops</text>
  <text x="230" y="451" fill="#f8fafc" font-size="10">GOTO / G66 custom macro</text>
  <text x="440" y="451" fill="#f8fafc" font-size="10">WHILE / DO / END</text>
  <text x="55" y="465" fill="#f8fafc" font-size="10">Extra work offsets</text>
  <text x="230" y="465" fill="#f8fafc" font-size="10">G54.1 P1–P48</text>
  <text x="440" y="465" fill="#f8fafc" font-size="10">G110–G129</text>
  <text x="55" y="479" fill="#f8fafc" font-size="10">Rigid tap init</text>
  <text x="230" y="479" fill="#f8fafc" font-size="10">M29 S____ then G84</text>
  <text x="440" y="479" fill="#f8fafc" font-size="10">G84 directly (auto rigid if param set)</text>
</svg>
