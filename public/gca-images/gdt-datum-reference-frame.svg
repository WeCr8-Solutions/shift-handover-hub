<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <rect width="800" height="500" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">GD&amp;T — Datum Reference Frame (DRF) &amp; Three-Plane Concept</text>

  <!-- 3D box representing the DRF -->
  <!-- Primary datum A (bottom face) -->
  <polygon points="120,300 320,300 400,250 200,250" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <!-- Secondary datum B (back face) -->
  <polygon points="120,300 120,140 200,90 200,250" fill="#1e3a2f" stroke="#22c55e" stroke-width="2"/>
  <!-- Tertiary datum C (left face) -->
  <polygon points="120,300 320,300 320,140 120,140" fill="#2d1b4e" stroke="#a855f7" stroke-width="2"/>
  <!-- Top face (not datum) -->
  <polygon points="120,140 320,140 400,90 200,90" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Right face -->
  <polygon points="320,300 400,250 400,90 320,140" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Datum labels -->
  <text x="230" y="285" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">DATUM A</text>
  <text x="148" y="200" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" transform="rotate(-30,148,200)">DATUM B</text>
  <text x="220" y="230" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">DATUM C</text>

  <!-- Datum triangles (physical symbols) -->
  <polygon points="270,300 280,318 260,318" fill="#3b82f6" stroke="#60a5fa" stroke-width="1"/>
  <line x1="270" y1="318" x2="270" y2="334" stroke="#3b82f6" stroke-width="2"/>
  <rect x="258" y="334" width="24" height="16" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="270" y="346" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">A</text>

  <polygon points="120,190 102,190 102,210" fill="#22c55e" stroke="#4ade80" stroke-width="1"/>
  <line x1="102" y1="200" x2="86" y2="200" stroke="#22c55e" stroke-width="2"/>
  <rect x="62" y="191" width="24" height="16" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="74" y="203" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">B</text>

  <polygon points="220,300 220,318 240,318" fill="#a855f7" stroke="#c4b5fd" stroke-width="1"/>
  <line x1="230" y1="318" x2="230" y2="334" stroke="#a855f7" stroke-width="2"/>
  <rect x="218" y="334" width="24" height="16" rx="2" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <text x="230" y="346" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">C</text>

  <!-- Degrees of freedom table -->
  <rect x="440" y="55" width="340" height="230" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="610" y="74" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">Degrees of Freedom Constrained</text>
  <!-- headers -->
  <text x="455" y="95" fill="#94a3b8" font-size="11">Datum</text>
  <text x="530" y="95" fill="#94a3b8" font-size="11">Contact points</text>
  <text x="680" y="95" fill="#94a3b8" font-size="11">DOF removed</text>
  <line x1="440" y1="100" x2="780" y2="100" stroke="#334155" stroke-width="1"/>
  <!-- A row -->
  <text x="455" y="117" fill="#60a5fa" font-size="12" font-weight="700">A (primary)</text>
  <text x="530" y="117" fill="#f8fafc" font-size="11">3 points (flat)</text>
  <text x="680" y="117" fill="#f8fafc" font-size="11">3 rotations</text>
  <text x="455" y="130" fill="#64748b" font-size="10">Largest, most repeatable surface</text>
  <line x1="440" y1="135" x2="780" y2="135" stroke="#1f2937" stroke-width="1"/>
  <!-- B row -->
  <text x="455" y="152" fill="#4ade80" font-size="12" font-weight="700">B (secondary)</text>
  <text x="530" y="152" fill="#f8fafc" font-size="11">2 points (edge)</text>
  <text x="680" y="152" fill="#f8fafc" font-size="11">2 translations</text>
  <text x="455" y="165" fill="#64748b" font-size="10">Perpendicular to A; locks sliding</text>
  <line x1="440" y1="170" x2="780" y2="170" stroke="#1f2937" stroke-width="1"/>
  <!-- C row -->
  <text x="455" y="187" fill="#c4b5fd" font-size="12" font-weight="700">C (tertiary)</text>
  <text x="530" y="187" fill="#f8fafc" font-size="11">1 point</text>
  <text x="680" y="187" fill="#f8fafc" font-size="11">1 translation</text>
  <text x="455" y="200" fill="#64748b" font-size="10">Perpendicular to A &amp; B; stops rotation</text>
  <line x1="440" y1="205" x2="780" y2="205" stroke="#334155" stroke-width="1"/>
  <text x="455" y="223" fill="#f59e0b" font-size="11" font-weight="700">Total: 6 DOF constrained = fully located part</text>
  <text x="455" y="238" fill="#64748b" font-size="10">3 translations (X,Y,Z) + 3 rotations (pitch,yaw,roll)</text>
  <text x="455" y="252" fill="#64748b" font-size="10">= Repeatably clocked in fixture every time</text>

  <!-- FCF order callout -->
  <rect x="440" y="295" width="340" height="105" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="610" y="314" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">Reading Datum Order in FCF</text>
  <!-- mock FCF -->
  <rect x="455" y="325" width="200" height="24" rx="2" fill="#0f172a" stroke="#475569"/>
  <text x="468" y="341" fill="#f8fafc" font-family="monospace" font-size="12">⊕ | Ø0.010 Ⓜ | A | B | C</text>
  <!-- arrows -->
  <text x="460" y="370" fill="#60a5fa" font-size="10">Primary</text>
  <text x="525" y="370" fill="#4ade80" font-size="10">Secondary</text>
  <text x="580" y="370" fill="#c4b5fd" font-size="10">Tertiary</text>
  <line x1="475" y1="349" x2="475" y2="364" stroke="#60a5fa" stroke-width="1"/>
  <line x1="540" y1="349" x2="540" y2="364" stroke="#4ade80" stroke-width="1"/>
  <line x1="570" y1="349" x2="570" y2="364" stroke="#c4b5fd" stroke-width="1"/>
  <text x="660" y="356" fill="#64748b" font-size="10">Order = priority.</text>
  <text x="660" y="370" fill="#64748b" font-size="10">Never skip a datum</text>
  <text x="660" y="384" fill="#64748b" font-size="10">unless intentional.</text>

  <!-- 3-2-1 rule -->
  <rect x="40" y="360" width="380" height="120" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="230" y="378" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">3-2-1 Locating Rule (machining)</text>
  <text x="55" y="397" fill="#f8fafc" font-size="11">3 points on primary (datum A) → resist tipping</text>
  <text x="55" y="413" fill="#f8fafc" font-size="11">2 points on secondary (datum B) → resist sliding</text>
  <text x="55" y="429" fill="#f8fafc" font-size="11">1 point on tertiary (datum C) → resist rotation</text>
  <text x="55" y="450" fill="#64748b" font-size="10">Physical locating pins/pads in a machining fixture follow this exact pattern.</text>
  <text x="55" y="464" fill="#64748b" font-size="10">CMM measurement also references this DRF for all position/orientation callouts.</text>
</svg>
