<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui,sans-serif">
  <rect width="800" height="520" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Lathe ID Operations — Boring · ID Grooving · ID Threading · Reaming · Drilling</text>

  <!-- ── ID BORING ── -->
  <g transform="translate(20,48)">
    <rect width="148" height="270" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">ID Boring (G01)</text>
    <!-- tube cross-section -->
    <rect x="18" y="30" width="112" height="120" rx="3" fill="#475569"/>
    <rect x="36" y="30" width="76" height="120" fill="#0f172a"/>
    <!-- boring bar -->
    <rect x="16" y="82" width="88" height="8" rx="2" fill="#78716c"/>
    <polygon points="104,82 120,86 104,90" fill="#fbbf24"/>
    <!-- arrows showing material removal -->
    <line x1="74" y1="30" x2="74" y2="38" stroke="#ef4444" stroke-width="1.5" marker-end="url(#da1)"/>
    <line x1="74" y1="150" x2="74" y2="142" stroke="#ef4444" stroke-width="1.5" marker-end="url(#da2)"/>
    <text x="74" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">Enlarges existing hole</text>
    <text x="74" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">Bar must clear bore ID</text>
    <text x="12" y="202" fill="#f8fafc" font-family="monospace" font-size="9">G00 X(ID-0.02) Z0.1</text>
    <text x="12" y="215" fill="#f8fafc" font-family="monospace" font-size="9">G01 Z-depth F0.005</text>
    <text x="12" y="228" fill="#64748b" font-size="9">X negative = larger bore</text>
    <text x="12" y="241" fill="#64748b" font-size="9">(away from center in diam)</text>
    <text x="12" y="257" fill="#64748b" font-size="9">G76 for internal threads</text>
  </g>

  <!-- ── ID GROOVING ── -->
  <g transform="translate(180,48)">
    <rect width="148" height="270" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">ID Grooving (G01/G75)</text>
    <rect x="18" y="30" width="112" height="120" rx="3" fill="#475569"/>
    <rect x="36" y="30" width="76" height="120" fill="#0f172a"/>
    <!-- groove cut into ID wall -->
    <rect x="36" y="62" width="18" height="36" fill="#475569"/>
    <!-- grooving tool -->
    <rect x="16" y="74" width="52" height="10" rx="2" fill="#78716c"/>
    <polygon points="68,74 80,79 68,84" fill="#fbbf24"/>
    <text x="74" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">O-ring groove / snap ring</text>
    <text x="74" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">Thread relief undercut</text>
    <text x="12" y="202" fill="#f8fafc" font-family="monospace" font-size="9">G00 X(groove-dia) Z(pos)</text>
    <text x="12" y="215" fill="#f8fafc" font-family="monospace" font-size="9">G01 X(depth) F0.003</text>
    <text x="12" y="228" fill="#f8fafc" font-family="monospace" font-size="9">G04 P500  ← dwell</text>
    <text x="12" y="241" fill="#f8fafc" font-family="monospace" font-size="9">G01 X(clear) F0.010</text>
    <text x="12" y="257" fill="#64748b" font-size="9">G75: peck grooving cycle</text>
  </g>

  <!-- ── ID THREADING ── -->
  <g transform="translate(340,48)">
    <rect width="148" height="270" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">ID Threading (G76)</text>
    <rect x="18" y="30" width="112" height="120" rx="3" fill="#475569"/>
    <rect x="36" y="30" width="76" height="120" fill="#0f172a"/>
    <!-- internal thread path -->
    <path d="M36,38 L50,30 L64,38 L78,30 L92,38 L106,30 L112,34" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    <path d="M36,150 L50,142 L64,150 L78,142 L92,150 L106,142 L112,146" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    <!-- boring bar with thread insert -->
    <rect x="14" y="82" width="80" height="8" rx="2" fill="#78716c"/>
    <polygon points="94,82 108,86 94,90" fill="#fbbf24"/>
    <text x="74" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">G76 same syntax as OD</text>
    <text x="74" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">X = minor (larger for ID)</text>
    <text x="12" y="202" fill="#f8fafc" font-family="monospace" font-size="9">G76 P010060 Q0050 R.002</text>
    <text x="12" y="215" fill="#f8fafc" font-family="monospace" font-size="9">G76 X(major) Z-len</text>
    <text x="12" y="228" fill="#f8fafc" font-family="monospace" font-size="9">   P__ Q__ F(pitch)</text>
    <text x="12" y="244" fill="#64748b" font-size="9">ID: X major &gt; X minor</text>
    <text x="12" y="257" fill="#64748b" font-size="9">Pre-bore to minor dia first</text>
  </g>

  <!-- ── DRILLING ── -->
  <g transform="translate(500,48)">
    <rect width="148" height="270" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Drilling (G83/G81)</text>
    <rect x="18" y="30" width="112" height="120" rx="3" fill="#475569"/>
    <!-- drill hole -->
    <rect x="62" y="30" width="24" height="90" fill="#0f172a"/>
    <polygon points="62,120 86,120 74,136" fill="#0f172a"/>
    <!-- drill body -->
    <rect x="64" y="0" width="20" height="90" rx="3" fill="#78716c"/>
    <polygon points="64,90 84,90 74,108" fill="#a855f7"/>
    <!-- flutes (simplified) -->
    <line x1="68" y1="20" x2="72" y2="85" stroke="#94a3b8" stroke-width="1"/>
    <line x1="80" y1="20" x2="76" y2="85" stroke="#94a3b8" stroke-width="1"/>
    <text x="74" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">On-center live tool or</text>
    <text x="74" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">tailstock (C=0, spindle off)</text>
    <text x="12" y="202" fill="#f8fafc" font-family="monospace" font-size="9">M19  (spindle orient)</text>
    <text x="12" y="215" fill="#f8fafc" font-family="monospace" font-size="9">G83 Z-depth R0.1</text>
    <text x="12" y="228" fill="#f8fafc" font-family="monospace" font-size="9">    Q0.25 F0.008</text>
    <text x="12" y="241" fill="#64748b" font-size="9">Live tool: C-axis + M-spindle</text>
    <text x="12" y="254" fill="#64748b" font-size="9">Tailstock: hand-feed or G74</text>
  </g>

  <!-- ── REAMING ── -->
  <g transform="translate(660,48)">
    <rect width="120" height="270" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Reaming (G85)</text>
    <rect x="10" y="30" width="100" height="120" rx="3" fill="#475569"/>
    <rect x="30" y="30" width="60" height="120" fill="#0f172a"/>
    <!-- reamer body -->
    <rect x="44" y="0" width="22" height="95" rx="2" fill="#78716c"/>
    <rect x="42" y="95" width="26" height="30" rx="1" fill="#22d3ee" opacity="0.7"/>
    <polygon points="42,125 66,125 60,138 48,138" fill="#22d3ee"/>
    <text x="60" y="168" text-anchor="middle" fill="#94a3b8" font-size="9">Finish-size a drilled hole</text>
    <text x="60" y="180" text-anchor="middle" fill="#94a3b8" font-size="9">to H7/H6 tolerance</text>
    <text x="10" y="200" fill="#f8fafc" font-family="monospace" font-size="9">G85 Z-dep R0.1 F0.010</text>
    <text x="10" y="214" fill="#64748b" font-size="9">G85 feeds in AND out</text>
    <text x="10" y="227" fill="#64748b" font-size="9">Drill to -0.010/+0.005</text>
    <text x="10" y="240" fill="#64748b" font-size="9">undersize before reaming</text>
    <text x="10" y="255" fill="#64748b" font-size="9">Feed = 0.5–1× drill rate</text>
  </g>

  <!-- Comparison table -->
  <rect x="20" y="330" width="760" height="172" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="349" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">ID Operation Selection Guide</text>
  <line x1="20" y1="355" x2="780" y2="355" stroke="#334155"/>
  <text x="35" y="371" fill="#94a3b8" font-size="11" font-weight="600">Operation</text>
  <text x="175" y="371" fill="#94a3b8" font-size="11" font-weight="600">Pre-condition</text>
  <text x="340" y="371" fill="#94a3b8" font-size="11" font-weight="600">Tolerance achievable</text>
  <text x="530" y="371" fill="#94a3b8" font-size="11" font-weight="600">Typical feed (IPR)</text>
  <text x="35" y="390" fill="#60a5fa" font-size="11">Drilling</text>          <text x="175" y="390" fill="#f8fafc" font-size="11">Solid stock or center drill first</text>  <text x="340" y="390" fill="#f8fafc" font-size="11">±0.005"</text>         <text x="530" y="390" fill="#f8fafc" font-size="11">0.005–0.012</text>
  <text x="35" y="407" fill="#3b82f6" font-size="11">ID Boring (rough)</text> <text x="175" y="407" fill="#f8fafc" font-size="11">Existing hole (drilled/cast)</text>       <text x="340" y="407" fill="#f8fafc" font-size="11">±0.002"</text>         <text x="530" y="407" fill="#f8fafc" font-size="11">0.008–0.015</text>
  <text x="35" y="424" fill="#3b82f6" font-size="11">ID Boring (finish)</text> <text x="175" y="424" fill="#f8fafc" font-size="11">Rough bored to +0.010"</text>             <text x="340" y="424" fill="#f8fafc" font-size="11">±0.0005"</text>        <text x="530" y="424" fill="#f8fafc" font-size="11">0.003–0.006</text>
  <text x="35" y="441" fill="#22d3ee" font-size="11">Reaming</text>           <text x="175" y="441" fill="#f8fafc" font-size="11">Drilled -0.010"/+0.005" undersize</text>  <text x="340" y="441" fill="#f8fafc" font-size="11">H7 (±0.0005")</text>   <text x="530" y="441" fill="#f8fafc" font-size="11">0.010–0.020</text>
  <text x="35" y="458" fill="#fdba74" font-size="11">ID Grooving</text>       <text x="175" y="458" fill="#f8fafc" font-size="11">Bored to final size first</text>          <text x="340" y="458" fill="#f8fafc" font-size="11">±0.002" groove width</text><text x="530" y="458" fill="#f8fafc" font-size="11">0.002–0.004</text>
  <text x="35" y="475" fill="#86efac" font-size="11">ID Threading</text>      <text x="175" y="475" fill="#f8fafc" font-size="11">Bored to minor diameter first</text>      <text x="340" y="475" fill="#f8fafc" font-size="11">Class 2B–3B fit</text>  <text x="530" y="475" fill="#f8fafc" font-size="11">F = pitch (IPR)</text>
  <text x="35" y="493" fill="#64748b" font-size="10">Bar overhang rule: max 4× bar diameter unsupported. Use anti-vibration bar for L/D &gt; 4. Reduce DOC and feed at long overhangs.</text>

  <defs>
    <marker id="da1" markerWidth="5" markerHeight="5" refX="3" refY="5" orient="auto"><path d="M0,0 L5,0 L2.5,5 z" fill="#ef4444"/></marker>
    <marker id="da2" markerWidth="5" markerHeight="5" refX="3" refY="0" orient="auto"><path d="M0,5 L5,5 L2.5,0 z" fill="#ef4444"/></marker>
  </defs>
</svg>
