<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <rect width="800" height="500" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">Micrometer Reading — Inch &amp; Metric</text>

  <!-- ── INCH MICROMETER ── -->
  <rect x="20" y="45" width="370" height="315" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="66" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">Inch Micrometer (0–1", 0.0001" resolution)</text>

  <!-- Sleeve (barrel) -->
  <rect x="50" y="90" width="240" height="36" rx="4" fill="#334155"/>
  <!-- Reference line -->
  <line x1="50" y1="108" x2="290" y2="108" stroke="#f8fafc" stroke-width="1"/>
  <!-- Sleeve major divisions (0.025" each = 1 turn) -->
  <!-- 0, 1(0.025), 2(0.050), 3(0.075), 4(0.100), 5(0.125)... show 0–7 -->
  <!-- Numbered marks at 0, 4(0.100), 8(0.200) etc -->
  <line x1="70" y1="90" x2="70" y2="100" stroke="#f8fafc" stroke-width="1.5"/>  <!-- 0 -->
  <line x1="95" y1="92" x2="95" y2="100" stroke="#94a3b8" stroke-width="1"/>    <!-- 0.025 -->
  <line x1="120" y1="90" x2="120" y2="100" stroke="#f8fafc" stroke-width="1.5"/><!-- 0.050 -->
  <line x1="145" y1="92" x2="145" y2="100" stroke="#94a3b8" stroke-width="1"/>  <!-- 0.075 -->
  <line x1="170" y1="88" x2="170" y2="100" stroke="#f8fafc" stroke-width="2"/>  <!-- 0.100 (numbered) -->
  <line x1="195" y1="92" x2="195" y2="100" stroke="#94a3b8" stroke-width="1"/>  <!-- 0.125 -->
  <line x1="220" y1="90" x2="220" y2="100" stroke="#f8fafc" stroke-width="1.5"/><!-- 0.150 -->
  <line x1="245" y1="92" x2="245" y2="100" stroke="#94a3b8" stroke-width="1"/>  <!-- 0.175 -->
  <line x1="270" y1="88" x2="270" y2="100" stroke="#f8fafc" stroke-width="2"/>  <!-- 0.200 (numbered) -->
  <!-- Numbers on sleeve -->
  <text x="68" y="88" text-anchor="middle" fill="#94a3b8" font-size="9">0</text>
  <text x="168" y="86" text-anchor="middle" fill="#94a3b8" font-size="9">1</text>
  <text x="268" y="86" text-anchor="middle" fill="#94a3b8" font-size="9">2</text>
  <!-- Thimble divisions below line (25 divs = 0.001" each) -->
  <line x1="220" y1="108" x2="220" y2="118" stroke="#f59e0b" stroke-width="1"/>
  <line x1="226" y1="108" x2="226" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="232" y1="108" x2="232" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="238" y1="108" x2="238" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="244" y1="108" x2="244" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="250" y1="108" x2="250" y2="118" stroke="#f59e0b" stroke-width="1"/>
  <text x="249" y="128" text-anchor="middle" fill="#f59e0b" font-size="9">5</text>
  <text x="219" y="128" text-anchor="middle" fill="#f59e0b" font-size="9">0</text>
  <!-- vernier line (for 0.0001") -->
  <line x1="232" y1="108" x2="232" y2="122" stroke="#ef4444" stroke-width="1.5"/>
  <text x="235" y="135" fill="#ef4444" font-size="9">vernier</text>
  <!-- Thimble edge indicator -->
  <line x1="220" y1="80" x2="220" y2="90" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="78" text-anchor="middle" fill="#f59e0b" font-size="9">thimble edge</text>

  <!-- Reading example -->
  <rect x="38" y="145" width="344" height="90" rx="5" fill="#111827" stroke="#1f2937"/>
  <text x="210" y="163" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="700">Reading Example = 0.2178"</text>
  <text x="48" y="181" fill="#3b82f6" font-size="11">Sleeve   (0.025 x 8 visible divs)  = 0.200</text>
  <text x="48" y="196" fill="#f59e0b" font-size="11">Thimble  (line 17.5 aligned)       = 0.0175</text>
  <text x="48" y="211" fill="#ef4444" font-size="11">Vernier  (3rd vernier line aligns) = 0.0003</text>
  <text x="48" y="226" fill="#22c55e" font-size="11" font-weight="700">                              Total = 0.2178"</text>

  <!-- Inch parts label -->
  <rect x="38" y="245" width="344" height="100" rx="5" fill="#111827" stroke="#1f2937"/>
  <text x="210" y="263" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">Resolution &amp; Parts</text>
  <text x="48" y="280" fill="#f8fafc" font-size="11">Thimble: 25 divisions × 0.001" = one full turn (0.025")</text>
  <text x="48" y="295" fill="#f8fafc" font-size="11">Sleeve tick spacing = 0.025" per turn</text>
  <text x="48" y="310" fill="#f8fafc" font-size="11">Vernier (10 lines) adds 0.0001" resolution</text>
  <text x="48" y="326" fill="#64748b" font-size="10">Lock nut, ratchet stop (limits feel to consistent 1–2 N⋅m)</text>
  <text x="48" y="340" fill="#64748b" font-size="10">Anvil + spindle close on workpiece. Spindle has 0.5 mm pitch.</text>

  <!-- ── METRIC MICROMETER ── -->
  <rect x="410" y="45" width="370" height="315" rx="7" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="595" y="66" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Metric Micrometer (0–25 mm, 0.001 mm res)</text>

  <!-- Metric sleeve -->
  <rect x="440" y="90" width="240" height="36" rx="4" fill="#334155"/>
  <line x1="440" y1="108" x2="680" y2="108" stroke="#f8fafc" stroke-width="1"/>
  <!-- Metric marks: 1mm above line, 0.5mm below -->
  <line x1="455" y1="90" x2="455" y2="100" stroke="#f8fafc" stroke-width="1.5"/> <!-- 0 -->
  <line x1="470" y1="112" x2="470" y2="122" stroke="#94a3b8" stroke-width="1"/>  <!-- 0.5 -->
  <line x1="485" y1="90" x2="485" y2="100" stroke="#f8fafc" stroke-width="1.5"/> <!-- 1 -->
  <line x1="500" y1="112" x2="500" y2="122" stroke="#94a3b8" stroke-width="1"/>  <!-- 1.5 -->
  <line x1="515" y1="88" x2="515" y2="100" stroke="#f8fafc" stroke-width="2"/>   <!-- 2 (num) -->
  <line x1="530" y1="112" x2="530" y2="122" stroke="#94a3b8" stroke-width="1"/>  <!-- 2.5 -->
  <line x1="545" y1="90" x2="545" y2="100" stroke="#f8fafc" stroke-width="1.5"/> <!-- 3 -->
  <line x1="560" y1="112" x2="560" y2="122" stroke="#94a3b8" stroke-width="1"/>  <!-- 3.5 -->
  <line x1="575" y1="88" x2="575" y2="100" stroke="#f8fafc" stroke-width="2"/>   <!-- 4 (num) -->
  <line x1="590" y1="112" x2="590" y2="122" stroke="#94a3b8" stroke-width="1"/>  <!-- 4.5 -->
  <line x1="605" y1="90" x2="605" y2="100" stroke="#f8fafc" stroke-width="1.5"/> <!-- 5 -->
  <text x="453" y="88" text-anchor="middle" fill="#94a3b8" font-size="9">0</text>
  <text x="513" y="86" text-anchor="middle" fill="#94a3b8" font-size="9">2</text>
  <text x="573" y="86" text-anchor="middle" fill="#94a3b8" font-size="9">4</text>
  <!-- Thimble divisions (50 per turn = 0.5mm pitch → 0.01mm each) -->
  <line x1="545" y1="108" x2="545" y2="118" stroke="#f59e0b" stroke-width="1"/>
  <line x1="551" y1="108" x2="551" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="557" y1="108" x2="557" y2="116" stroke="#94a3b8" stroke-width="1"/>
  <line x1="563" y1="108" x2="563" y2="118" stroke="#f59e0b" stroke-width="1"/>
  <text x="545" y="128" text-anchor="middle" fill="#f59e0b" font-size="9">0</text>
  <text x="563" y="128" text-anchor="middle" fill="#f59e0b" font-size="9">10</text>
  <!-- Thimble edge -->
  <line x1="545" y1="80" x2="545" y2="90" stroke="#f59e0b" stroke-width="2"/>
  <text x="545" y="78" text-anchor="middle" fill="#f59e0b" font-size="9">thimble edge</text>

  <!-- Reading example -->
  <rect x="428" y="145" width="344" height="90" rx="5" fill="#111827" stroke="#1f2937"/>
  <text x="600" y="163" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="700">Reading Example = 3.07 mm</text>
  <text x="438" y="181" fill="#22c55e" font-size="11">Sleeve   (visible above line: 3.0 mm) = 3.000 mm</text>
  <text x="438" y="196" fill="#94a3b8" font-size="11">Below line (0.5mm line hidden)       = 0.000 mm</text>
  <text x="438" y="211" fill="#f59e0b" font-size="11">Thimble  (line 7 aligned × 0.01 mm) = 0.070 mm</text>
  <text x="438" y="226" fill="#22c55e" font-size="11" font-weight="700">                               Total = 3.070 mm</text>

  <!-- Metric parts label -->
  <rect x="428" y="245" width="344" height="100" rx="5" fill="#111827" stroke="#1f2937"/>
  <text x="600" y="263" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">Resolution &amp; Pitch</text>
  <text x="438" y="280" fill="#f8fafc" font-size="11">Spindle pitch: 0.5 mm per revolution</text>
  <text x="438" y="295" fill="#f8fafc" font-size="11">Thimble: 50 divisions × 0.01 mm each</text>
  <text x="438" y="310" fill="#f8fafc" font-size="11">0.5mm marks below line = half-turn exposed</text>
  <text x="438" y="326" fill="#64748b" font-size="10">When 0.5mm line is visible below datum line,</text>
  <text x="438" y="340" fill="#64748b" font-size="10">add 0.5 to sleeve reading before adding thimble.</text>

  <!-- Footer -->
  <rect x="20" y="370" width="760" height="110" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="389" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">Common Micrometer Mistakes</text>
  <text x="35" y="408" fill="#ef4444" font-size="11">✗ Forgetting to add the 0.5 mm sleeve line (metric) → off by 0.5 mm</text>
  <text x="35" y="424" fill="#ef4444" font-size="11">✗ Reading thimble without checking sleeve last visible line → off by 0.025" or 1 mm</text>
  <text x="35" y="440" fill="#ef4444" font-size="11">✗ Not using ratchet — inconsistent feel changes reading by 0.001"+ (elastic contact)</text>
  <text x="35" y="456" fill="#22c55e" font-size="11">✓ Clean anvil + spindle with tissue, zero-check before use, lock spindle for reading</text>
  <text x="35" y="472" fill="#22c55e" font-size="11">✓ Hold at insulating sleeve only — body heat expands barrel causing measurement error</text>
</svg>
