<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="monospace,system-ui,sans-serif">
  <rect width="800" height="520" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="17" font-weight="700">Fanuc CNC — Program Structure &amp; Block Anatomy</text>

  <!-- Program listing panel -->
  <rect x="40" y="48" width="360" height="400" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1.5"/>
  <text x="220" y="68" text-anchor="middle" font-family="system-ui,sans-serif" fill="#6b7280" font-size="11">O1234 — Sample Mill Program</text>

  <!-- Code lines with syntax highlights -->
  <text x="60" y="92"  fill="#a855f7" font-size="13">%</text>
  <text x="60" y="110" fill="#a855f7" font-size="13">O1234</text>
  <text x="60" y="128" fill="#6b7280" font-size="13">(PART: WIDGET_BODY  DATE: 2026-04-18)</text>
  <text x="60" y="146" fill="#6b7280" font-size="13">(SETUP: G54  MATERIAL: 6061-T6 AL)</text>
  <text x="60" y="164" fill="#22d3ee" font-size="13">G20 G17 G40 G49 G80 G90</text>
  <text x="60" y="182" fill="#f8fafc" font-size="13">G91 G28 Z0.</text>
  <text x="60" y="200" fill="#f8fafc" font-size="13">T01 M06</text>
  <text x="60" y="218" fill="#6b7280" font-size="13">(T01: 0.500 4-FL END MILL)</text>
  <text x="60" y="236" fill="#22c55e" font-size="13">G90 G54 G00 X0. Y0. S3500 M03</text>
  <text x="60" y="254" fill="#22c55e" font-size="13">G43 H01 Z0.5</text>
  <text x="60" y="272" fill="#f8fafc" font-size="13">G01 Z-0.375 F15.</text>
  <text x="60" y="290" fill="#f8fafc" font-size="13">G01 X3.0 F25.</text>
  <text x="60" y="308" fill="#f8fafc" font-size="13">G01 Y2.0</text>
  <text x="60" y="326" fill="#f8fafc" font-size="13">G01 X0. Y0.</text>
  <text x="60" y="344" fill="#fbbf24" font-size="13">G00 Z1.0</text>
  <text x="60" y="362" fill="#fbbf24" font-size="13">G91 G28 Z0.</text>
  <text x="60" y="380" fill="#fbbf24" font-size="13">G91 G28 X0. Y0.</text>
  <text x="60" y="398" fill="#ef4444" font-size="13">M30</text>
  <text x="60" y="416" fill="#a855f7" font-size="13">%</text>
  <text x="60" y="434" fill="#6b7280" font-size="13">; (end of file)</text>

  <!-- Annotation callouts -->
  <!-- % tape start/end -->
  <line x1="403" y1="88" x2="440" y2="88" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="403" y1="408" x2="440" y2="408" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="440" y1="88" x2="440" y2="408" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="445" y="58" width="305" height="60" rx="5" fill="#1a1a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="460" y="76" font-family="system-ui,sans-serif" fill="#c4b5fd" font-size="11" font-weight="600">% — Program start/end marker</text>
  <text x="460" y="92" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">Required by some DNC systems. O-number</text>
  <text x="460" y="106" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">identifies the program (O0001–O9999).</text>

  <!-- Safety line -->
  <line x1="403" y1="162" x2="445" y2="162" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="445" y="132" width="305" height="60" rx="5" fill="#1a1a2e" stroke="#22d3ee" stroke-width="1"/>
  <text x="460" y="150" font-family="system-ui,sans-serif" fill="#67e8f9" font-size="11" font-weight="600">Safety / Init block (run every program)</text>
  <text x="460" y="166" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">G20 inch | G40 cancel CDC | G49 cancel TLO</text>
  <text x="460" y="180" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">G80 cancel canned | G90 absolute mode</text>

  <!-- Tool call -->
  <line x1="403" y1="198" x2="445" y2="198" stroke="#f97316" stroke-width="1.5"/>
  <rect x="445" y="195" width="305" height="42" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="460" y="212" font-family="system-ui,sans-serif" fill="#fdba74" font-size="11" font-weight="600">T__ M06 — select tool, execute ATC</text>
  <text x="460" y="227" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">Tool number in carousel; M06 triggers change.</text>

  <!-- Start move + G43 -->
  <line x1="403" y1="236" x2="445" y2="254" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="445" y="250" width="305" height="60" rx="5" fill="#1a1a2e" stroke="#22c55e" stroke-width="1"/>
  <text x="460" y="268" font-family="system-ui,sans-serif" fill="#86efac" font-size="11" font-weight="600">G43 H__ — Tool Length Offset compensation ON</text>
  <text x="460" y="283" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">H register = offset #. G43=positive, G44=negative.</text>
  <text x="460" y="298" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">Must be active before Z approach to part.</text>

  <!-- End / M30 -->
  <line x1="403" y1="396" x2="445" y2="396" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="445" y="370" width="305" height="42" rx="5" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="460" y="388" font-family="system-ui,sans-serif" fill="#fca5a5" font-size="11" font-weight="600">M30 — End of program, reset, rewind</text>
  <text x="460" y="403" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="10">M02 = end without rewind. M30 preferred.</text>

  <!-- Footer -->
  <rect x="40" y="460" width="720" height="42" rx="5" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="476" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11">Modal G-codes stay active until changed. Non-modal (G04, G28) apply to one block only.</text>
  <text x="400" y="493" text-anchor="middle" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">Group 01: G00/G01/G02/G03 (motion) | Group 03: G90/G91 (abs/incr) | Group 12: G17/G18/G19 (plane)</text>
</svg>
