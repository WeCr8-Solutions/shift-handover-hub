<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <rect width="800" height="500" fill="#0f172a"/>
  <text x="400" y="34" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">Mill Work Offsets — G54–G59 &amp; Machine vs Work Coordinate Systems</text>

  <!-- Machine table -->
  <rect x="60" y="60" width="680" height="260" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" fill="#475569" font-size="12">Machine Table</text>

  <!-- Machine Home (MCS origin) -->
  <circle cx="680" cy="290" r="8" fill="#ef4444"/>
  <line x1="680" y1="290" x2="730" y2="290" stroke="#ef4444" stroke-width="2"/>
  <line x1="680" y1="290" x2="680" y2="240" stroke="#ef4444" stroke-width="2"/>
  <text x="738" y="294" fill="#ef4444" font-size="11" font-weight="700">X0 (MCS)</text>
  <text x="686" y="236" fill="#ef4444" font-size="11" font-weight="700">Y0 (MCS)</text>
  <text x="670" y="315" fill="#ef4444" font-size="10">Machine Home</text>

  <!-- Part 1 / G54 -->
  <rect x="100" y="110" width="140" height="100" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="135" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Part 1</text>
  <circle cx="130" cy="155" r="6" fill="#3b82f6"/>
  <line x1="130" y1="155" x2="162" y2="155" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="130" y1="155" x2="130" y2="125" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="150" fill="#60a5fa" font-size="11" font-weight="700">G54</text>
  <text x="95" y="163" fill="#60a5fa" font-size="9">X-12.500</text>
  <text x="95" y="175" fill="#60a5fa" font-size="9">Y-8.000</text>

  <!-- Part 2 / G55 -->
  <rect x="280" y="100" width="140" height="120" rx="4" fill="#1e3a2f" stroke="#22c55e" stroke-width="1.5"/>
  <text x="350" y="125" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Part 2</text>
  <circle cx="310" cy="145" r="6" fill="#22c55e"/>
  <line x1="310" y1="145" x2="342" y2="145" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="310" y1="145" x2="310" y2="115" stroke="#22c55e" stroke-width="1.5"/>
  <text x="275" y="142" fill="#4ade80" font-size="11" font-weight="700">G55</text>
  <text x="275" y="155" fill="#4ade80" font-size="9">X-7.500</text>
  <text x="275" y="167" fill="#4ade80" font-size="9">Y-8.250</text>

  <!-- Part 3 / G56 -->
  <rect x="460" y="115" width="140" height="90" rx="4" fill="#2d1b4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="530" y="140" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Part 3</text>
  <circle cx="490" cy="160" r="6" fill="#a855f7"/>
  <line x1="490" y1="160" x2="522" y2="160" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="490" y1="160" x2="490" y2="130" stroke="#a855f7" stroke-width="1.5"/>
  <text x="455" y="158" fill="#c4b5fd" font-size="11" font-weight="700">G56</text>
  <text x="455" y="170" fill="#c4b5fd" font-size="9">X-2.000</text>
  <text x="455" y="182" fill="#c4b5fd" font-size="9">Y-8.100</text>

  <!-- Offset arrows from MCS to each G54 origin -->
  <line x1="680" y1="290" x2="130" y2="155" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="680" y1="290" x2="310" y2="145" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="680" y1="290" x2="490" y2="160" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Explanation boxes -->
  <rect x="60" y="345" width="340" height="130" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="80" y="365" fill="#94a3b8" font-size="12" font-weight="700">How Work Offsets Work</text>
  <text x="80" y="383" fill="#f8fafc" font-size="11">G54 tells the controller: "when I say X0, I mean</text>
  <text x="80" y="398" fill="#f8fafc" font-size="11">the G54 origin on the part, not machine home."</text>
  <text x="80" y="415" fill="#f8fafc" font-size="11">Set with G10 L2 Pn X__ Y__ Z__  (in program)</text>
  <text x="80" y="430" fill="#f8fafc" font-size="11">or via MDI / offset page on control.</text>
  <text x="80" y="448" fill="#64748b" font-size="10">G10 L2 P1 X-12.5 Y-8.0 Z-3.75  → sets G54</text>
  <text x="80" y="463" fill="#64748b" font-size="10">P1=G54, P2=G55, P3=G56, P4=G57, P5=G58, P6=G59</text>

  <rect x="420" y="345" width="320" height="130" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="440" y="365" fill="#94a3b8" font-size="12" font-weight="700">G54 vs G55 vs G56 Use Cases</text>
  <text x="440" y="383" fill="#f8fafc" font-size="11">Multi-part fixture: G54 = part 1, G55 = part 2…</text>
  <text x="440" y="398" fill="#f8fafc" font-size="11">Op10 / Op20: G54 = first op, G55 = flip op</text>
  <text x="440" y="413" fill="#f8fafc" font-size="11">Same program, different nests on a tombstone</text>
  <text x="440" y="430" fill="#f8fafc" font-size="11">G53 = always machine coords (no offset)</text>
  <text x="440" y="448" fill="#64748b" font-size="10">Fanuc extended: G54.1 P1–P48 (48 extra offsets)</text>
  <text x="440" y="463" fill="#64748b" font-size="10">Haas: G110–G129 (additional work offsets)</text>
</svg>
