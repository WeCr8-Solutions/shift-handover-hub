<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui,sans-ui,monospace">
  <rect width="800" height="520" fill="#0f172a"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="16" font-weight="700">Mazak · Okuma · Siemens — Controller Syntax Comparison</text>

  <!-- ── MAZAK (MAZATROL / EIA) ── -->
  <rect x="15" y="45" width="245" height="400" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="15" y="45" width="245" height="28" rx="7" fill="#1e3a1e"/>
  <text x="137" y="64" text-anchor="middle" font-family="system-ui,sans-serif" fill="#fbbf24" font-size="13" font-weight="700">Mazak (MAZATROL / EIA)</text>
  <text x="28" y="90" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Two programming modes:</text>
  <text x="28" y="106" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">EIA/ISO — standard G-code</text>
  <text x="28" y="121" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">MAZATROL — conversational</text>
  <text x="28" y="140" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">MAZATROL conversational flow:</text>
  <text x="28" y="156" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">1. Material + stock size</text>
  <text x="28" y="171" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">2. Unit type (face / contour / drill)</text>
  <text x="28" y="186" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">3. Tool number + geometry</text>
  <text x="28" y="201" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">4. Part geometry (profile points)</text>
  <text x="28" y="216" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">5. SPC check</text>
  <text x="28" y="235" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">EIA mode differences:</text>
  <text x="28" y="251" font-family="monospace" fill="#f8fafc" font-size="10">G10 L2 P1 → G54 via EIA</text>
  <text x="28" y="265" font-family="monospace" fill="#f8fafc" font-size="10">SETREG — store variable</text>
  <text x="28" y="279" font-family="monospace" fill="#f8fafc" font-size="10">GETREG — retrieve variable</text>
  <text x="28" y="297" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Key MAZATROL terms:</text>
  <text x="28" y="313" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">UNIT — a machining operation block</text>
  <text x="28" y="326" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">SPC — supplementary process cmd</text>
  <text x="28" y="339" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">ATC check auto — auto tool measure</text>
  <text x="28" y="352" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">FIGURE — profile definition screen</text>
  <text x="28" y="371" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Smooth Technology (SST):</text>
  <text x="28" y="387" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">AI contour control — smooths</text>
  <text x="28" y="400" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">high-feed toolpaths automatically.</text>
  <text x="28" y="413" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">G05.1 Q1 — AI contour on</text>
  <text x="28" y="428" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">G05.1 Q0 — AI contour off</text>

  <!-- ── OKUMA (OSP) ── -->
  <rect x="277" y="45" width="245" height="400" rx="7" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="277" y="45" width="245" height="28" rx="7" fill="#0c2233"/>
  <text x="399" y="64" text-anchor="middle" font-family="system-ui,sans-serif" fill="#67e8f9" font-size="13" font-weight="700">Okuma (OSP-P300/P500)</text>
  <text x="290" y="90" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">OSP is Fanuc-compatible but adds:</text>
  <text x="290" y="106" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">TURN — conversational lathe mode</text>
  <text x="290" y="121" font-family="system-ui,sans-serif" fill="#f8fafc" font-size="11">MILL — conversational mill mode</text>
  <text x="290" y="140" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Okuma-specific G-codes:</text>
  <text x="290" y="156" font-family="monospace" fill="#f8fafc" font-size="10">G23 — store current position</text>
  <text x="290" y="170" font-family="monospace" fill="#f8fafc" font-size="10">G24 — return to stored pos</text>
  <text x="290" y="184" font-family="monospace" fill="#f8fafc" font-size="10">G22 — absolute zero set</text>
  <text x="290" y="198" font-family="monospace" fill="#f8fafc" font-size="10">G14/G15 — secondary zero</text>
  <text x="290" y="216" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Variable system (OSP variables):</text>
  <text x="290" y="232" font-family="monospace" fill="#f8fafc" font-size="10">VC100 = 2.5  (common vars)</text>
  <text x="290" y="246" font-family="monospace" fill="#f8fafc" font-size="10">VA1 = 0.5   (local vars)</text>
  <text x="290" y="260" font-family="monospace" fill="#f8fafc" font-size="10">IF (VC100 GT 5) THEN GOTO L10</text>
  <text x="290" y="274" font-family="monospace" fill="#f8fafc" font-size="10">DO WHILE (VA1 LE 10)</text>
  <text x="290" y="288" font-family="monospace" fill="#f8fafc" font-size="10">  VA1 = VA1 + 1</text>
  <text x="290" y="302" font-family="monospace" fill="#f8fafc" font-size="10">LOOP</text>
  <text x="290" y="320" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Thermal compensation:</text>
  <text x="290" y="336" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">Okuma Thermo-Friendly Concept</text>
  <text x="290" y="349" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">auto-compensates for spindle/ball</text>
  <text x="290" y="362" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">screw thermal growth — no warm-up</text>
  <text x="290" y="375" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">program required in most cases.</text>
  <text x="290" y="395" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Sub-programs:</text>
  <text x="290" y="411" font-family="monospace" fill="#64748b" font-size="10">CALL O____ (not M98)</text>
  <text x="290" y="425" font-family="monospace" fill="#64748b" font-size="10">CALL L____ (local sub)</text>
  <text x="290" y="439" font-family="monospace" fill="#64748b" font-size="10">RTS — return from sub</text>

  <!-- ── SIEMENS (Sinumerik 840D) ── -->
  <rect x="539" y="45" width="245" height="400" rx="7" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="539" y="45" width="245" height="28" rx="7" fill="#1e1a33"/>
  <text x="661" y="64" text-anchor="middle" font-family="system-ui,sans-serif" fill="#c4b5fd" font-size="13" font-weight="700">Siemens Sinumerik 840D sl</text>
  <text x="552" y="90" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Structure differences from Fanuc:</text>
  <text x="552" y="106" font-family="monospace" fill="#f8fafc" font-size="10">%_N_WIDGET_MPF  ← program file</text>
  <text x="552" y="120" font-family="monospace" fill="#f8fafc" font-size="10">;$PATH=/NC_MPF   ← path comment</text>
  <text x="552" y="134" font-family="monospace" fill="#f8fafc" font-size="10">N10 G0 G90 G94 G17</text>
  <text x="552" y="148" font-family="monospace" fill="#f8fafc" font-size="10">N20 T="ENDMILL_D12" D1</text>
  <text x="552" y="162" font-family="monospace" fill="#f8fafc" font-size="10">N30 M6</text>
  <text x="552" y="176" font-family="monospace" fill="#f8fafc" font-size="10">N40 G54 S3000 M3 F500</text>
  <text x="552" y="194" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Tool call: name string, not number</text>
  <text x="552" y="210" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">T="DRILL_D8.5" selects by name.</text>
  <text x="552" y="223" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">D1 = cutting edge (offset block).</text>
  <text x="552" y="240" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Feed &amp; speed units:</text>
  <text x="552" y="256" font-family="monospace" fill="#f8fafc" font-size="10">G94 — mm/min (or inch/min)</text>
  <text x="552" y="270" font-family="monospace" fill="#f8fafc" font-size="10">G95 — mm/rev (feed per rev)</text>
  <text x="552" y="284" font-family="monospace" fill="#f8fafc" font-size="10">G96 — constant cutting speed</text>
  <text x="552" y="298" font-family="monospace" fill="#f8fafc" font-size="10">LIMS=3000 — max RPM cap (G50 equiv)</text>
  <text x="552" y="316" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Siemens-specific cycles:</text>
  <text x="552" y="332" font-family="monospace" fill="#f8fafc" font-size="10">CYCLE81 — drilling</text>
  <text x="552" y="346" font-family="monospace" fill="#f8fafc" font-size="10">CYCLE83 — deep hole peck</text>
  <text x="552" y="360" font-family="monospace" fill="#f8fafc" font-size="10">CYCLE840 — rigid tapping</text>
  <text x="552" y="374" font-family="monospace" fill="#f8fafc" font-size="10">POCKET3/POCKET4 — milling pockets</text>
  <text x="552" y="390" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">Variables &amp; R-parameters:</text>
  <text x="552" y="406" font-family="monospace" fill="#64748b" font-size="10">R0 = 2.5  (R-params like Fanuc #)</text>
  <text x="552" y="420" font-family="monospace" fill="#64748b" font-size="10">DEF REAL myVar = 1.5  (typed var)</text>
  <text x="552" y="434" font-family="monospace" fill="#64748b" font-size="10">IF myVar &gt; 3 GOTOF label</text>
  <text x="552" y="448" font-family="monospace" fill="#64748b" font-size="10">FOR i=1 TO 10 ... ENDFOR</text>

  <!-- Footer -->
  <rect x="15" y="455" width="769" height="50" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="473" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8" font-size="11" font-weight="600">All three controls run ISO G-code for basic motion. Differences appear in: variable/macro syntax, sub-program calls, cycle names, and tool management.</text>
  <text x="400" y="490" text-anchor="middle" font-family="system-ui,sans-serif" fill="#64748b" font-size="10">Mazak: SETREG/GETREG + MAZATROL conversational | Okuma: VC/VA variables + DO WHILE | Siemens: R-params + typed DEF variables + named tools</text>
</svg>
