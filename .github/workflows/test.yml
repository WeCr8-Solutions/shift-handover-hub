name: Test Suite

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test

      - name: Upload coverage (if generated)
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  typecheck:
    name: TypeScript (web app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

  typecheck-desktop:
    name: TypeScript (Electron desktop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install desktop dependencies
        run: npm install --no-audit --no-fund
        working-directory: desktop

      - name: Type check desktop
        run: npx tsc --noEmit
        working-directory: desktop

  production-smoke:
    name: Production smoke (cert verify · release manifest · bug report)
    runs-on: ubuntu-latest
    # Network-dependent (hits production Supabase + jobline.ai). Runs on main
    # only so PRs from forks (no secrets, possibly no outbound) don't flake.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Public certificate verification smoke
        env:
          # Known-good cert ids sampled from production. Set via repo Variables
          # (SAMPLE_OAP_CERT_ID / SAMPLE_GCA_CERT_ID). When unset the script
          # only verifies the RPCs are anon-callable (returns []), which is
          # sufficient to catch 401/403/404/500 regressions.
          SAMPLE_OAP_CERT_ID: ${{ vars.SAMPLE_OAP_CERT_ID }}
          SAMPLE_GCA_CERT_ID: ${{ vars.SAMPLE_GCA_CERT_ID }}
        run: node scripts/cert-verify-smoke.mjs

      - name: Release manifest smoke
        # Verifies /release.json on the live site is correct and has a real SHA.
        # Will fail if Lovable/Vercel build env is not exposing a git commit SHA.
        run: node scripts/release-manifest-smoke.mjs

      - name: Bug-report (report-issue) edge function smoke
        # Verifies the report-issue edge function is deployed, CORS-enabled,
        # and rejects unauthenticated requests with 401 (not 5xx).
        run: node scripts/bug-report-smoke.mjs
