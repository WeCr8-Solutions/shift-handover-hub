name: OWASP ZAP DAST Scan

on:
  schedule:
    # Every Monday at 09:00 UTC — after weekly security-scan
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Override scan target URL'
        required: false
        default: 'https://jobline.ai'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.skills/**'

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Baseline (passive) scan — safe to run against production
  # Crawls the app and reports known vulnerabilities without attacking
  # ─────────────────────────────────────────────────────────────────
  zap-baseline:
    name: ZAP Baseline Scan (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: .zap

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ github.event.inputs.target || 'https://jobline.ai' }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          issue_title: 'ZAP Baseline Scan — ${{ github.run_id }}'
          fail_action: false          # Report findings; do not fail the build on baseline
          allow_issue_writing: true

      - name: Upload Baseline Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 90

      - name: Upload Baseline SARIF to GitHub Security
        # Makes passive scan findings visible in Security → Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report_sarif.json
          category: 'ZAP Baseline Scan'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Full (active) scan — ONLY against dev/staging environment
  # Used on PRs to main and manual/scheduled runs
  # NEVER target production with the full scanner
  # ─────────────────────────────────────────────────────────────────
  zap-full-scan:
    name: ZAP Full Scan (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: .zap

      - name: ZAP Full Scan Against Staging
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'https://dev.jobline.ai'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          issue_title: 'ZAP Full Scan — ${{ github.run_id }}'
          fail_action: false
          allow_issue_writing: ${{ github.event_name == 'schedule' }}

      - name: Upload Full Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-scan-report-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 90

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report_sarif.json
          category: 'ZAP Full Scan'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Report summary — post scan statistics to PR or workflow summary
  # ─────────────────────────────────────────────────────────────────
  scan-summary:
    name: Post Scan Summary
    runs-on: ubuntu-latest
    needs: [zap-baseline, zap-full-scan]
    if: always()

    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          pattern: zap-*-report-*
          merge-multiple: true

      - name: Write Job Summary
        run: |
          echo "## OWASP ZAP DAST Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | Target | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Baseline (passive) | https://jobline.ai | ${{ needs.zap-baseline.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full scan (active) | https://dev.jobline.ai | ${{ needs.zap-full-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts retained for 90 days. See Security → Code scanning for SARIF findings." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**FedRAMP controls:** CA-8 (Penetration Testing), RA-5 (Vulnerability Scanning)" >> "$GITHUB_STEP_SUMMARY"
