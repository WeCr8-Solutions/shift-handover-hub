name: Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 AM UTC
  workflow_dispatch:       # Manual trigger for on-demand scans

jobs:
  dependency-audit:
    name: npm audit (Dependency Vulnerabilities)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (Critical + High)
        # Fail if any Critical or High severity vulnerabilities are found.
        # Per VMP SLA: Critical = 24h remediation, High = 7 days.
        run: npm audit --audit-level=high

      - name: Run npm audit (full report - informational)
        # Always output the full report even if the above passed, for review.
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ github.run_id }}
          path: npm-audit-report.json
          retention-days: 90

  trivy-scan:
    name: Trivy (CVE + Secret Scan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          # FedRAMP: fail on Critical and High findings (SI-2, RA-5)
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy secret scan
        # Detect hardcoded credentials / API keys in source (IA-5, SC-28)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy (full SARIF report for audit log)
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ github.run_id }}
          path: trivy-results.sarif
          retention-days: 90

  sbom:
    name: SBOM Generation (G-03)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        # Produces a CycloneDX JSON SBOM (SR-3, SA-12)
        uses: anchore/sbom-action@v0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: 'sbom.cyclonedx.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.cyclonedx.json
          retention-days: 365  # Retain 1 year for FedRAMP evidence continuity
