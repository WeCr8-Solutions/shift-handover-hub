name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.skills/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.skills/**'
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 AM UTC
  workflow_dispatch:       # Manual trigger for on-demand scans

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

jobs:
  dependency-audit:
    name: npm audit (Dependency Vulnerabilities)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (Critical + High)
        # Fail if any Critical or High severity vulnerabilities are found in
        # production dependencies. Dev-only tooling (e.g. @vercel/node and its
        # transitive deps) is excluded via --omit=dev; those packages are never
        # shipped to end users. Per VMP SLA: Critical = 24h, High = 7 days.
        run: npm audit --omit=dev --audit-level=high

      - name: Run npm audit (full report - informational)
        # Always output the full report even if the above passed, for review.
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ github.run_id }}
          path: npm-audit-report.json
          retention-days: 90

  trivy-scan:
    name: Trivy (CVE + Secret Scan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          # FedRAMP: fail on Critical and High findings (SI-2, RA-5)
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy secret scan
        # Detect hardcoded credentials / API keys in source (IA-5, SC-28)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy (full SARIF report for audit log)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF to GitHub Security tab
        # Makes findings visible in Security → Code Scanning (not just a zip artifact)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: 'Trivy'
        continue-on-error: true

      - name: Upload Trivy SARIF artifact (FedRAMP evidence copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ github.run_id }}
          path: trivy-results.sarif
          retention-days: 90

  sbom:
    name: SBOM Generation (G-03)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        # Produces a CycloneDX JSON SBOM (SR-3, SA-12)
        uses: anchore/sbom-action@v0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: 'sbom.cyclonedx.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.cyclonedx.json
          retention-days: 365  # Retain 1 year for FedRAMP evidence continuity

  # ─────────────────────────────────────────────────────────────────
  # HTTP security headers smoke test — verifies vercel.json headers
  # are actually being served by the production deployment.
  # Skipped on PRs (branch not yet deployed). FedRAMP: SC-8.
  # ─────────────────────────────────────────────────────────────────
  headers-check:
    name: HTTP Security Headers (Production)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Verify security headers on production
        # Curl the production URL and check each required header is present.
        # Exits 1 on any missing header so the failure is visible in the UI,
        # but job-level continue-on-error prevents blocking unrelated branches.
        run: |
          HEADERS=$(curl -sI https://jobline.ai)
          echo "$HEADERS"
          FAILED=0

          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "PASS: $1"
            else
              echo "FAIL: $1 is missing"
              FAILED=$((FAILED + 1))
            fi
          }

          check_header "strict-transport-security"
          check_header "x-frame-options"
          check_header "x-content-type-options"
          check_header "content-security-policy"
          check_header "referrer-policy"
          check_header "permissions-policy"

          echo "## HTTP Security Headers (SC-8 Evidence)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** https://jobline.ai" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAILED" -eq 0 ]; then
            echo "All 6 required security headers are present." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$FAILED required header(s) missing — check vercel.json deployment." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # Nuclei passive scan — technology fingerprinting + exposure checks
  # SAFE: only uses passive/detection templates (no exploitation).
  # Skipped on PRs (no point scanning prod for a branch change).
  # FedRAMP: RA-5 (Vulnerability Monitoring and Scanning).
  # ─────────────────────────────────────────────────────────────────
  nuclei-scan:
    name: Nuclei Passive Scan (Production)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Nuclei passive scan
        uses: projectdiscovery/nuclei-action@v2
        with:
          target: https://jobline.ai
          # technologies/ — fingerprinting only (completely passive)
          # exposures/    — detect information disclosure without exploiting
          # Severity cap at medium avoids any active/exploit-class templates
          flags: '-t technologies/ -t exposures/ -severity info,low,medium -sarif-export nuclei-results.sarif'
          github-report: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Nuclei SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: nuclei-results.sarif
          category: 'Nuclei Passive Scan'
        continue-on-error: true
